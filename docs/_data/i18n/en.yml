        body: SnapTray renders at native Retina resolution. Every pixel of your HiDPI display is preserved in the output image — no scaling artifacts.
      - title: Instant Menu Bar Access
        body: Lives in your menu bar and launches instantly on F2. No Dock icon clutter, no app switching. Capture from any context without interruption.
      - title: Annotate in the Capture Overlay
        body: Arrows, shapes, text, step badges, mosaic blur, and emoji stickers are available immediately after capture. No need to open Preview or another editor.
      - title: Pin, Record, and Share
        body: Pin captures as floating references, record any region to MP4/GIF/WebP, extract text with OCR, or upload for a share link — all from the same tool.
