      - feature: GIF / WebP export
        values: [true, false, false, true]
      - feature: OCR text extraction
        values: [true, false, true, true]
      - feature: Auto blur
        values: [true, false, false, true]
      - feature: CLI automation
        values: [true, false, false, false]
      - feature: Free and open source
        values: [true, true, "Free tier", false]
  setup:
    eyebrow: Quick Start
    title: Running on Your Mac in 3 Steps
    steps:
      - title: Install
        detail: Download the DMG, drag SnapTray to Applications, and launch. Grant Screen Recording permission when prompted.
      - title: Capture
        detail: Press F2 to start your first region capture. The magnifier overlay appears immediately — drag to select.
      - title: Annotate and Share
        detail: Add arrows or text, then press Cmd+C to copy or Cmd+S to save. Press Enter to pin the capture on screen.
  faq:
    eyebrow: FAQ
    title: Mac-Specific Questions
    items:
      - q: Does SnapTray run natively on Apple Silicon?
        a: Yes. SnapTray ships as a universal binary that runs natively on both Apple Silicon (M1/M2/M3/M4) and Intel Macs with no Rosetta translation.
      - q: Why does macOS ask for Screen Recording permission?
        a: macOS requires explicit Screen Recording permission for any app that captures screen content. SnapTray needs this to function. Grant it in System Settings > Privacy & Security > Screen Recording.
      - q: How does SnapTray compare to CleanShot X?
        a: CleanShot X is a paid app with cloud features. SnapTray is free, open-source, and fully offline. Both offer annotation, recording, and OCR — but SnapTray adds CLI automation and cross-platform support at no cost.
      - q: Can I record system audio on Mac?
        a: System audio capture on macOS requires macOS 13+ or a virtual audio device like BlackHole. Microphone capture works out of the box.
