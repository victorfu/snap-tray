  setup:
    eyebrow: บทช่วยสอน
    title: วิธีใช้ SnapTray บน Windows
    steps:
      - title: ติดตั้งจาก Store หรือ GitHub
        detail: รับ SnapTray จาก Microsoft Store สำหรับการอัปเดตอัตโนมัติ หรือดาวน์โหลดตัวติดตั้งแบบสแตนด์อโลนจาก GitHub releases เปิดใช้งาน — ไอคอนถาดระบบจะปรากฏขึ้นทันที
      - title: จับภาพส่วน
        detail: กด F2 เพื่อเปิดโอเวอร์เลย์การจับภาพ ลากเพื่อเลือกส่วน หรือคลิกหน้าต่างที่ตรวจพบ แถบเครื่องมือมาร์กอัปพร้อมเครื่องมือทั้งหมดจะปรากฏโดยอัตโนมัติ
      - title: มาร์กอัปและส่งออก
        detail: เพิ่มลูกศร ข้อความ รูปทรง หรือเบลอ กด Ctrl+C เพื่อคัดลอก Ctrl+S เพื่อบันทึก หรือ Enter เพื่อปักหมุดบนหน้าจอ กำหนดค่าโฟลเดอร์เอาต์พุตและปุ่มลัดในการตั้งค่าสำหรับเวิร์กโฟลว์ที่ต้องการ
  faq:
    eyebrow: FAQ
    title: เครื่องมือสกรีนช็อต Windows — คำถามทั่วไป
    items:
      - q: วิธีจับสกรีนช็อตบน Windows?
        a: "Windows มี Win+Shift+S สำหรับการจับภาพเฉพาะส่วนพื้นฐานและ Print Screen สำหรับเต็มหน้าจอ สำหรับเวิร์กโฟลว์ขั้นสูงพร้อมมาร์กอัป บันทึก และระบบอัตโนมัติ ติดตั้ง SnapTray และกด F2 — ให้ความแม่นยำจากแว่นขยาย มาร์กอัปทันที และส่งออกด้วยกดปุ่มเดียว"
      - q: SnapTray รองรับ High-DPI และจอแสดงผล 4K ได้ไหม?
        a: ใช่ SnapTray รองรับ DPI และจัดการการตั้งค่า DPI แบบผสมหลายจอภาพได้อย่างถูกต้อง ภาพที่จับเรนเดอร์ที่ความละเอียดเนทีฟโดยไม่มีอาร์ติแฟกต์จากการปรับขนาด
      - q: SnapTray มีให้ใน Microsoft Store ไหม?
        a: ใช่ ติดตั้ง SnapTray จาก Microsoft Store สำหรับการอัปเดตอัตโนมัติและความปลอดภัยแบบแซนด์บ็อกซ์ หรือดาวน์โหลดตัวติดตั้งแบบสแตนด์อโลนจาก GitHub releases
      - q: SnapTray ต่างจาก ShareX อย่างไร?
        a: ShareX มีประสิทธิภาพสูงแต่ซับซ้อนพร้อมการตั้งค่าหลายร้อยรายการ SnapTray มุ่งเน้นที่ความเร็วและความเรียบง่าย — เปิดจากถาดระบบ เครื่องมือมาร์กอัปที่สะอาด หน้าต่างปักหมุด และการรองรับหลายแพลตฟอร์ม ทั้งสองฟรีและโอเพ่นซอร์ส
      - q: SnapTray ต่างจาก Greenshot อย่างไร?
        a: Greenshot ให้การจับภาพและมาร์กอัปพื้นฐานแต่ขาดการบันทึกหน้าจอ หน้าต่างปักหมุด OCR เบลออัตโนมัติ และระบบอัตโนมัติด้วย CLI SnapTray เพิ่มหน้าต่างปักหมุดและระบบอัตโนมัติด้วย CLI สำหรับแพลตฟอร์มที่รองรับ พร้อมการบันทึก OCR และเบลออัตโนมัติบน macOS/Windows นอกจากนี้ยังรองรับ macOS และ Linux beta สำหรับเวิร์กโฟลว์สกรีนช็อตและมาร์กอัป
      - q: ฉันสามารถใช้ SnapTray ในสคริปต์และระบบอัตโนมัติได้ไหม?
        a: "ใช่ SnapTray มี CLI ครบชุด: snaptray full, snaptray screen, snaptray region, snaptray gui, snaptray canvas, snaptray pin และ snaptray config รวมเข้ากับ PowerShell script, batch file หรือ CI pipeline"
