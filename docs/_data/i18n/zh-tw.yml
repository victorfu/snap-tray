      - q: SnapTray 需要註冊帳號或訂閱嗎？
        a: 不需要。SnapTray 是免費開源軟體，採用 MIT 授權。沒有帳號、訂閱、追蹤或廣告。直接下載使用。
      - q: 可以用腳本自動化截圖嗎？
        a: 可以。SnapTray 內建完整 CLI：擷取區域、錄製螢幕、釘選圖片、管理設定 — 全部可從終端機或 CI 流程操作。
      - q: SnapTray 比其他截圖工具快在哪裡？
        a: SnapTray 以常駐程式運行，按下 F2 立即開始擷取 — 無需等待應用程式啟動、無需切換視窗。標註在同一個覆蓋層中完成，匯出只需一個按鍵。
      - q: SnapTray 支援 macOS 和 Windows 嗎？
        a: 是的。SnapTray 支援 macOS 14+（Apple Silicon 和 Intel）以及 Windows 10+（x64）。兩個平台提供相同功能。
