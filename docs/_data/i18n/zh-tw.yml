landing_windows:
  hero:
    title: Windows 最佳截圖工具
    intro: "Windows 剪取工具可以進行基本擷取，但啟動速度慢、標註功能有限、沒有錄影功能，不足以應付每天的使用。如果你需要為文件、錯誤回報或設計回饋截圖，你需要更好的工具。SnapTray 是一款免費開源的截圖工具，用即時擷取、豐富標註、錄影和 CLI 自動化取代剪取工具。"
    cta_download: 下載 Windows 版
    cta_docs: 閱讀文件
  problems:
    eyebrow: 問題所在
    title: 剪取工具做錯了什麼
    subtitle: Windows 預設截圖體驗是為偶爾使用而設計，不適合專業工作流程。
    items:
      - pain: 啟動速度慢
        detail: 剪取工具需要先開啟完整視窗才能開始擷取。等到載入完成，你想擷取的畫面可能已經消失了。
      - pain: 標註功能陽春
        detail: 只有一支筆和一個螢光筆。沒有箭頭、形狀、步驟標記、文字工具或馬賽克模糊 — 完全不適合專業標註。
      - pain: 無法釘選或浮動參考
        detail: 每次擷取都進入視窗或檔案。你無法讓截圖保持在其他應用程式上方，一邊工作一邊快速參考。
      - pain: 沒有 CLI 或自動化
        detail: 沒有命令列介面。無法用腳本擷取、整合 CI，也無法自動化重複的截圖工作流程。
  features:
    eyebrow: 如何在 Windows 上更好地截圖
    title: 為什麼 SnapTray 能取代剪取工具
    subtitle: 高 DPI 支援、多螢幕處理、Microsoft Store 上架。
    items:
      - title: 托盤即時啟動
        body: 常駐系統托盤，按 F2 立即擷取。不需開啟視窗、不需切換應用程式 — 比剪取工具和 Win+Shift+S 都更快。
      - title: 完整標註工具組
        body: 箭頭、形狀、文字、步驟標記、馬賽克模糊、貼圖和復原/重做。直接在擷取覆蓋層中標註，不需開啟其他編輯器。
      - title: 高 DPI 與多螢幕
        body: SnapTray 正確處理混合 DPI 設定和多螢幕環境。4K 顯示器上不會有模糊擷取、偏移區域或縮放異常。
      - title: 錄影、釘選與自動化
        body: 錄製任意區域為 MP4/GIF/WebP、釘選截圖為浮動參考、用 OCR 擷取文字，並透過 CLI 腳本化所有操作：snaptray region、snaptray record、snaptray pin。
