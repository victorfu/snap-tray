        detail: 按 F2 開啟擷取覆蓋層。放大鏡立即出現 — 拖曳選取區域，或點擊偵測到的視窗進行擷取。
      - title: 標註與匯出
        detail: 使用工具列加上箭頭、文字、形狀或模糊效果。按 Cmd+C 複製、Cmd+S 儲存，或 Enter 釘選在螢幕上。需要時可上傳取得分享連結。
  faq:
    eyebrow: 常見問題
    title: Mac 截圖工具 — 常見問題
    items:
      - q: 如何在 Mac 上截圖？
        a: macOS 提供 Cmd+Shift+4 進行區域擷取、Cmd+Shift+3 擷取全螢幕。如需標註、錄影和分享等進階工作流程，安裝 SnapTray 後按 F2 — 提供放大鏡精準度、即時標註和一鍵匯出。
      - q: SnapTray 在 Apple Silicon 上是原生運行嗎？
        a: 是的。SnapTray 以通用二進位檔發布，在 Apple Silicon（M1/M2/M3/M4）和 Intel Mac 上都是原生運行，不需要 Rosetta 轉譯。
      - q: 為什麼 macOS 要求螢幕錄影權限？
        a: macOS 要求任何擷取螢幕內容的應用程式都必須取得螢幕錄影權限。SnapTray 需要此權限才能運作。請在系統設定 > 隱私權與安全性 > 螢幕錄影中授予。
      - q: SnapTray 和 CleanShot X 相比如何？
        a: CleanShot X 是付費應用程式，附帶雲端功能。SnapTray 免費、開源且完全離線。兩者都提供標註、錄影和 OCR — 但 SnapTray 額外提供 CLI 自動化和跨平台支援，而且完全免費。
      - q: 可以用 SnapTray 在 Mac 上錄製螢幕嗎？
        a: 可以。SnapTray 可錄製任意區域為 MP4（可選音訊），或匯出 GIF/WebP 無音訊片段。系統音訊擷取需要 macOS 13+ 或虛擬音訊裝置（如 BlackHole）。
      - q: SnapTray 比 Shottr 好嗎？
        a: Shottr 快速且輕量，但缺少螢幕錄影、釘選視窗和 CLI 自動化。SnapTray 包含所有這些功能，加上自動模糊、浮水印和跨平台支援 — 同時保持免費且開源。
