features:
  eyebrow: 機能一覧
  title: 高速でプロフェッショナルなキャプチャワークフローのために
  subtitle: ワンショットのスクリーンショットから macOS/Windows の録画セッションまで、SnapTray はすべてのキャプチャ作業をシステムトレイネイティブなワークフローに集約します。
  items:
    - kind: Capture
      title: 範囲キャプチャ
      body: 精密なクロスヘアとルーペで目標を指定。F2 を押すだけで即座に起動します。
    - kind: Canvas
      title: スクリーンキャンバス
      body: Ctrl+F2 / Cmd+F2 でデスクトップ上に直接描画し、その場で注釈を加えます。
    - kind: Pinning
      title: 画面にピン留め
      body: 参照画像を他のウィンドウの上に常時表示。自由にサイズ変更・回転が可能です。
    - kind: Annotation
      title: 豊富なツール群
      body: 矢印、ペン、マーカー、図形、テキスト、モザイク、ステップバッジ、絵文字スタンプ。
    - kind: Automation
      title: OCR（文字認識）＋自動ぼかし
      body: macOS/Windows でテキストを抽出し、機密性の高い顔や認証情報を自動でマスクして安全に共有できます。
    - kind: Detection
      title: ウィンドウ検出
      body: ウィンドウ範囲を手動でドラッグせずに素早く選択できます。
    - kind: Recording
      title: 画面録画
      body: macOS/Windows では、フル画面を録画して MP4（音声付き可）でエクスポート、または無音クリップ用に GIF/WebP で書き出せます。
    - kind: Utility
      title: カラーピッカー
      body: 画面上の色を取得し、Shift で HEX/RGB を切り替え、C で即座にコピーできます。
    - kind: Control
      title: 元に戻す / やり直し
      body: 注釈操作の完全な操作履歴を保持し、編集をいつでも取り消せます。
    - kind: Branding
      title: 透かし
      body: スクリーンショットやmacOS/Windows の録画にカスタム画像の透かしを適用します。
    - kind: Workflow
      title: ホットキー優先
      body: 範囲キャプチャ、キャンバス、貼り付け、クイックピン、ピンの表示/非表示はすべてワンキーで操作できます。

