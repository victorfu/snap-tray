    eyebrow: 튜토리얼
    title: Mac에서 SnapTray 사용하는 방법
    steps:
      - title: DMG에서 설치
        detail: GitHub 릴리스에서 DMG를 다운로드하고, SnapTray를 응용 프로그램으로 드래그한 후 실행합니다. macOS가 묻는 경우 화면 녹화 권한을 허용하세요.
      - title: 영역 캡처
        detail: F2를 눌러 캡처 오버레이를 엽니다. 돋보기가 즉시 나타납니다. 드래그하여 영역을 선택하거나, 감지된 창을 클릭하여 캡처합니다.
      - title: 주석 추가 및 내보내기
        detail: 툴바를 사용하여 화살표, 텍스트, 도형, 블러를 추가합니다. Cmd+C로 복사, Cmd+S로 저장, 또는 Enter로 화면에 고정합니다. 필요하면 공유 링크용으로 업로드합니다.
  faq:
    eyebrow: 자주 묻는 질문
    title: Mac 스크린샷 도구 — 자주 묻는 질문
    items:
      - q: Mac에서 스크린샷을 찍는 방법은?
        a: "macOS는 영역 캡처에 Cmd+Shift+4, 전체 화면에 Cmd+Shift+3을 제공합니다. 주석, 녹화, 공유를 포함한 고급 워크플로에는 SnapTray를 설치하고 F2를 누르세요. 돋보기 정밀도, 즉각적인 주석, 원키 내보내기를 제공합니다."
      - q: SnapTray가 Apple Silicon에서 네이티브로 실행되나요?
        a: 네. SnapTray는 Rosetta 변환 없이 Apple Silicon(M1/M2/M3/M4)과 Intel Mac 모두에서 네이티브로 실행되는 유니버설 바이너리로 제공됩니다.
      - q: macOS가 화면 녹화 권한을 요청하는 이유는?
        a: macOS는 화면 콘텐츠를 캡처하는 모든 앱에 대해 명시적인 화면 녹화 권한을 요구합니다. SnapTray가 작동하려면 이 권한이 필요합니다. 시스템 환경설정 > 개인 정보 보호 및 보안 > 화면 녹화에서 허용하세요.
      - q: SnapTray와 CleanShot X를 비교하면 어떻나요?
        a: CleanShot X는 클라우드 기능이 있는 유료 앱입니다. SnapTray는 무료, 오픈 소스, 완전 오프라인입니다. 둘 다 주석, 녹화, OCR을 제공하지만 SnapTray는 CLI 자동화와 크로스 플랫폼 지원을 무료로 추가합니다.
      - q: SnapTray로 Mac 화면을 녹화할 수 있나요?
        a: 네. SnapTray는 전체 화면을 선택적 오디오와 함께 MP4로 녹화하거나, 무음 클립용으로 GIF/WebP로 내보냅니다. 시스템 오디오 캡처에는 macOS 13+ 또는 BlackHole과 같은 가상 오디오 장치가 필요합니다.
      - q: SnapTray가 Shottr보다 낫나요?
        a: "Shottr는 빠르고 가볍지만 화면 녹화, 핀 창, CLI 자동화가 없습니다. SnapTray는 이 모든 기능 외에도 자동 블러, 워터마크, 크로스 플랫폼 지원을 포함하면서 무료 오픈 소스로 유지됩니다."
  cta:
    eyebrow: 시작하기
    title: macOS용 SnapTray 다운로드
    subtitle: 무료, 오픈 소스, Apple Silicon에서 네이티브 실행.
    button: .dmg 다운로드
    learn_more: 홈페이지 방문

