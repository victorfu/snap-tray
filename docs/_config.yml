title: SnapTray
description: "Screenshot, annotate, pin, and record your screen — with OCR, GIF export, and CLI automation. Free for macOS and Windows."
url: "https://snaptray.cc"
baseurl: ""
default_lang: en
supported_langs:
  - en
  - zh-tw

markdown: kramdown
highlighter: rouge
permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

github:
  repo_owner: "victorfu"
  repo_name: "snap-tray"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

defaults:
  - scope:
      path: "googlef5650c4c1be55237.html"
    values:
      sitemap: false
  - scope:
      path: "favicon.ico"
    values:
      sitemap: false
  - scope:
      path: "552776bc517f41109e28b11ca261ed1d.txt"
    values:
      sitemap: false
