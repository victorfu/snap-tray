        values: [true, true, true, true]
  usecases:
    eyebrow: 使用情境
    title: 誰每天都在使用截圖工具
    items:
      - role: 開發者
        scenario: 擷取錯誤訊息、標註架構圖、錄製重現步驟 — 直接貼到 GitHub Issue 或 Slack。
      - role: 設計師
        scenario: 釘選參考圖、並排比較版面、量測像素距離、匯出標註回饋給開發者。
      - role: 客服團隊
        scenario: 截圖客戶問題、加上步驟標記、模糊敏感資料、分享連結 — 全程不離開對話視窗。
      - role: 教育工作者
        scenario: 錄製教學影片、用螢幕畫布在簡報上即時標註、匯出 GIF 嵌入文件。
  setup:
    eyebrow: 快速開始
    title: 如何開始使用 SnapTray
    steps:
      - title: 下載與安裝
        detail: 從 GitHub Releases 取得 SnapTray（macOS DMG 或 Windows 安裝檔）或從 Microsoft Store 安裝。啟動後托盤圖示立即出現。
      - title: 擷取第一張截圖
        detail: 按 F2 開啟擷取覆蓋層。拖曳選取區域，或點擊偵測到的視窗。標註工具列自動出現。
      - title: 標註、儲存與分享
        detail: 加上箭頭、文字、形狀或模糊效果。按 Ctrl+C / Cmd+C 複製、Ctrl+S / Cmd+S 儲存，或 Enter 釘選在螢幕上。可上傳取得附密碼的分享連結。
  faq:
    eyebrow: 常見問題
    title: 截圖工具 — 常見問題
    items:
      - q: 什麼是截圖工具？
        a: 截圖工具是一種能擷取螢幕部分或全部畫面為圖片的軟體。基本工具只能儲存圖片。進階截圖工具如 SnapTray 還能標註、錄影、釘選截圖到螢幕，以及透過連結分享。
      - q: SnapTray 是什麼？
        a: SnapTray 是一款免費開源的截圖與螢幕錄影工具，支援 macOS 與 Windows。常駐系統托盤，提供即時區域擷取、豐富標註、釘選視窗、MP4/GIF/WebP 錄影、OCR、自動模糊和 CLI 自動化。
      - q: SnapTray 是免費的嗎？
        a: 是的。SnapTray 完全免費且開源，採用 MIT 授權。沒有廣告、訂閱、帳號或隱藏費用。
      - q: SnapTray 和剪取工具有什麼不同？
        a: 剪取工具提供基本擷取和極少的標註功能。SnapTray 額外提供放大鏡、完整標註工具組（箭頭、形狀、文字、步驟標記、馬賽克模糊）、釘選視窗、螢幕錄影、GIF/WebP 匯出、OCR、自動模糊和 CLI 自動化 — 全部免費且跨平台。
      - q: SnapTray 和 Lightshot 有什麼不同？
        a: Lightshot 提供快速擷取和簡單標註，但缺少螢幕錄影、釘選視窗、OCR、自動模糊和 CLI 支援。SnapTray 包含所有這些功能，同時保持免費、開源且完全離線。
      - q: SnapTray 支援 macOS 和 Windows 嗎？
        a: 是的。SnapTray 支援 macOS 14+（Apple Silicon 和 Intel）以及 Windows 10+（x64）。兩個平台提供相同功能。
      - q: 可以用腳本自動化截圖嗎？
        a: 可以。SnapTray 內建完整 CLI：snaptray full、snaptray region、snaptray record、snaptray pin 和 snaptray config。可整合 Shell 腳本、CI 流程或自動化工作流。
  cta:
    eyebrow: 立即開始
    title: 下載 SnapTray — 免費且開源
    subtitle: 支援 macOS 與 Windows，無需註冊。
    button: 立即下載
    learn_more: 前往首頁

