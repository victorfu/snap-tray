  setup:
    eyebrow: Tutorial
    title: How to Use SnapTray on Mac
    steps:
      - title: Install from DMG
        detail: Download the DMG from GitHub releases, drag SnapTray to Applications, and launch. Grant Screen Recording permission when macOS prompts you.
