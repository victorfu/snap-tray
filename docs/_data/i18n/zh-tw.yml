    intro: "macOS 內建 Cmd+Shift+4 進行基本截圖，但也僅止於此 — 沒有標註、沒有釘選視窗、沒有區域錄影、沒有 OCR。如果你每天都在截圖工作，你需要一個能處理完整流程的工具。SnapTray 是一款免費開源的截圖工具，為你的 Mac 增添專業擷取、標註、錄影和分享功能。"
    cta_download: 下載 .dmg
