faq:
  eyebrow: よくある質問
  title: よくある質問
  items:
    - q: SnapTray とは何ですか？
      a: SnapTray は、macOS、Windows、および Ubuntu 22.04 X11 beta 向けの無料の軽量スクリーンショット・注釈ツールです。システムトレイに常駐し、範囲キャプチャ、スクリーンショットへの注釈付け、画像のピン留めが可能です。録画と OCR は Linux beta には含まれていません。
    - q: SnapTray は無料ですか？
      a: はい、SnapTray は MIT ライセンスの下で完全に無料かつオープンソースです。広告、サブスクリプション、隠れたコストは一切ありません。
    - q: SnapTray と Snipping Tool の違いは何ですか？
      a: SnapTray は基本的な画面キャプチャを超えた機能を提供します。画面上の注釈ツール、常時表示の参照用ピン留めウィンドウ、スクリーンキャンバスモード、QR コードスキャン、自動化のためのフル CLI を搭載。macOS/Windows では MP4 音声録画、GIF/WebP エクスポート、OCR テキスト抽出、自動ぼかしが利用可能ですが、Linux beta には含まれていません。

