landing_mac:
  hero:
    title: Mac을 위한 최고의 스크린샷 도구
    intro: "macOS에는 기본 화면 캡처용 Cmd+Shift+4가 있지만 거기서 끝납니다. 주석도, 핀 창도, MP4/GIF/WebP 녹화 워크플로도, OCR도 없습니다. 업무용으로 매일 스크린샷을 찍는다면 전체 워크플로를 처리할 수 있는 도구가 필요합니다. SnapTray는 Mac에 전문적인 캡처, 주석, 녹화, 공유 기능을 추가하는 무료 오픈 소스 스크린샷 도구입니다."
    cta_download: .dmg 다운로드
    cta_docs: 문서 읽기
  problems:
    eyebrow: 문제점
    title: Cmd+Shift+4만으로는 부족한 이유
    subtitle: macOS 내장 스크린샷 도구는 기본 캡처를 처리하지만 전문적인 워크플로에는 부족합니다.
    items:
      - pain: 캡처 후 주석 기능 없음
        detail: macOS는 원시 이미지를 저장합니다. 화살표, 텍스트, 블러를 추가하려면 Preview나 서드파티 편집기를 열어야 하며 매번 워크플로가 중단됩니다.
      - pain: 고정 또는 플로팅 참조 없음
        detail: 작업하는 동안 스크린샷을 계속 표시해 둘 수 없습니다. 모든 캡처가 파일로 사라지며 지속적으로 창을 전환해야 합니다.
      - pain: 화면 녹화 파이프라인 없음
        detail: QuickTime Player는 전체 화면을 녹화하지만 영역 선택이 없고, 일시 정지/재개도 없으며, 빠른 공유를 위한 GIF나 WebP 내보내기도 없습니다.
      - pain: OCR 또는 QR 코드 스캔 없음
        detail: 스크린샷에서 텍스트를 추출하려면 수동으로 다시 입력해야 합니다. 화면 콘텐츠에서 QR 코드를 스캔하는 내장 방법이 없습니다.
  features:
    eyebrow: Mac에서 더 나은 스크린샷을 찍는 방법
    title: SnapTray가 Mac 워크플로에 추가하는 것
    subtitle: Apple Silicon과 Intel에서 네이티브 성능, macOS와의 깊은 통합.
    items:
      - title: Retina 품질 캡처
        body: SnapTray는 네이티브 Retina 해상도로 렌더링합니다. HiDPI 디스플레이의 모든 픽셀이 출력 이미지에 보존되며 스케일링 아티팩트가 없습니다.
      - title: 즉각적인 메뉴 바 접근
        body: 메뉴 바에 상주하며 F2로 즉시 실행됩니다. 독 아이콘 혼잡도 없고, 앱 전환도 없습니다. 어떤 컨텍스트에서도 중단 없이 캡처합니다.
      - title: 캡처 오버레이에서 주석 추가
        body: 캡처 직후 화살표, 도형, 텍스트, 단계 배지, 모자이크 블러, 이모지 스티커를 바로 사용할 수 있습니다. Preview나 다른 편집기를 열 필요가 없습니다.
      - title: 고정, 녹화, 공유
        body: 캡처를 플로팅 참조로 고정하고, 전체 화면을 MP4/GIF/WebP로 녹화하고, OCR로 텍스트를 추출하거나, 공유 링크용으로 업로드합니다. 모두 같은 Mac 도구에서 가능합니다.
