features:
  eyebrow: Feature Set
  title: Built for fast, professional capture pipelines
  subtitle: From one-shot screenshots to long recording sessions, SnapTray keeps every operation inside a single tray-native workflow.
  items:
    - kind: Capture
      title: Region Capture
      body: Precision crosshair and magnifier targeting. Press F2 to start instantly.
    - kind: Canvas
      title: Screen Canvas
      body: Draw directly on top of your desktop with Ctrl+F2 / Cmd+F2 and annotate in place.
    - kind: Pinning
      title: Pin to Screen
      body: Keep reference images visible above other windows. Resize and rotate freely.
    - kind: Annotation
      title: Rich Tooling
      body: Arrow, pencil, marker, shapes, text, mosaic, step badges, and emoji stickers.
    - kind: Automation
      title: OCR + Auto Blur
      body: Extract text and automatically mask sensitive faces or credentials for safer sharing.
    - kind: Detection
      title: Window Detection
      body: Quickly select windows without manually dragging exact bounds.
    - kind: Recording
      title: Screen Recording
      body: Capture any region and export MP4 with optional audio, or GIF/WebP for silent clips.
    - kind: Utility
      title: Color Picker
      body: Pick on-screen colors, switch HEX/RGB with Shift, copy instantly with C.
    - kind: Control
      title: Undo / Redo
      body: Full action history across annotation operations so edits stay reversible.
    - kind: Sharing
      title: Share URL
      body: Upload captures and generate share links with optional password protection.
    - kind: Branding
      title: Watermark
      body: Apply custom image watermark overlays to screenshots and recordings.
    - kind: Workflow
      title: Hotkey First
      body: Region Capture, Canvas, Paste, Quick Pin, and Hide/Show Pins stay one keystroke away.

