landing_screenshot_tool:
  hero:
    title: 빠른 캡처를 위한 최고의 스크린샷 도구
    intro: "스크린샷 도구는 문서 작성, 버그 보고, 튜토리얼, 빠른 공유를 위해 화면의 일부를 이미지로 캡처합니다. 대부분의 운영 체제에는 기본 도구가 포함되어 있지만, 내장 도구는 캡처에서 멈춥니다. 주석, 녹화, 스크린샷 공유를 정기적으로 한다면 해당 워크플로에 맞는 도구가 필요합니다. SnapTray는 macOS, Windows, Ubuntu 22.04 X11 beta용 무료 오픈 소스 스크린샷 도구로 캡처, 주석, 공유를 한 곳에서 처리합니다. 녹화는 macOS 및 Windows에서 사용 가능합니다."
    cta_download: 무료 다운로드
    cta_docs: 문서 읽기
  problems:
    eyebrow: 문제점
    title: 내장 스크린샷 도구가 부족한 이유
    subtitle: Windows와 macOS의 기본 도구는 일상적인 사용이 아닌 가끔의 사용을 위해 설계되었습니다.
    items:
      - pain: Windows Snipping Tool은 느리고 기본적
        detail: Snipping Tool은 캡처하기 전에 전체 창을 엽니다. 주석은 펜과 형광펜으로만 제한되며, 화살표, 도형, 텍스트가 없습니다. CLI도, 화면 고정도, 녹화 파이프라인도 없습니다.
      - pain: Mac 스크린샷에는 캡처 후 도구가 없음
        detail: Cmd+Shift+4로 영역을 캡처할 수 있지만 거기서 끝납니다. 주석을 추가하려면 Preview나 서드파티 편집기가 필요하여 매번 워크플로가 중단됩니다. 핀 창도, MP4/GIF/WebP 녹화 워크플로도, OCR도 없습니다.
      - pain: 서드파티 도구는 비대하거나 유료
        detail: 많은 대안이 계정 등록, 클라우드 구독을 요구하거나 무거운 Electron 앱으로 제공됩니다. 간단한 캡처·주석 워크플로에 500 MB의 RAM이나 월 구독료는 필요하지 않습니다.
  features:
    eyebrow: 해결책
    title: SnapTray가 이를 해결하는 방법
    subtitle: 세 단계로 내장 스크린샷 워크플로를 대체하는 경량 트레이 상주 도구.
    items:
      - title: 어떤 영역이든 즉시 캡처
        body: F2를 눌러 캡처 오버레이를 실행합니다. 돋보기로 픽셀 수준의 정밀도를 제공하고, 창 감지로 한 번의 클릭으로 전체 창을 선택할 수 있습니다. 앱 전환도, 로딩 화면도 없습니다.
      - title: 캡처를 벗어나지 않고 주석 추가
        body: 화살표, 도형, 텍스트, 단계 배지, 모자이크 블러, 이모지 스티커가 같은 오버레이 내에 표시됩니다. 별도의 편집기를 열거나 다른 앱에 붙여넣을 필요가 없습니다.
      - title: 공유, 저장, 또는 고정
        body: 클립보드에 복사, 디스크에 저장, 공유 링크용 업로드, 또는 플로팅 참조 창으로 고정합니다. macOS/Windows에서 전체 화면 녹화를 MP4, GIF, WebP로 내보낼 수 있습니다. 모든 작업이 단 하나의 키 입력으로 가능합니다.
  compare:
    eyebrow: 비교
    title: "SnapTray vs Snipping Tool vs Lightshot vs ShareX"
    feature_label: 기능
    tools:
      - SnapTray
      - Snipping Tool
      - Lightshot
      - ShareX
    rows:
      - feature: 돋보기 영역 캡처
        values: [true, false, false, true]
      - feature: 내장 주석 도구
        values: [true, false, true, true]
      - feature: 화면에 고정
        values: [true, false, false, false]
      - feature: 화면 녹화(MP4, macOS/Windows만 해당)
        values: [true, true, false, true]
      - feature: GIF / WebP 내보내기(macOS/Windows만 해당)
        values: [true, false, false, true]
      - feature: OCR 텍스트 추출(macOS/Windows만 해당)
        values: [true, false, false, true]
      - feature: 자동 블러(얼굴·자격 증명)
        values: [true, false, false, false]
      - feature: CLI 자동화
        values: [true, false, false, true]
      - feature: 크로스 플랫폼(macOS + Windows + Linux beta)
        values: [true, false, false, false]
      - feature: 무료 오픈 소스
        values: [true, true, true, true]
  usecases:
    eyebrow: 사용 사례
    title: 스크린샷 도구를 매일 사용하는 사람들
    items:
      - role: 개발자
        scenario: 오류 추적을 캡처하고, 아키텍처 다이어그램에 주석을 추가하며, macOS/Windows에서 버그 보고용 재현 단계를 녹화하여 GitHub 이슈나 Slack에 바로 붙여넣습니다.
      - role: 디자이너
        scenario: 참조 이미지를 화면에 고정하고, 레이아웃을 나란히 비교하며, 픽셀 거리를 측정하고, 개발자를 위한 주석이 달린 피드백을 내보냅니다.
      - role: 지원팀
        scenario: 고객 문제를 스크린샷하고, 단계 배지 주석을 추가하며, 민감한 데이터를 블러 처리하고, 링크를 공유합니다. 모든 작업이 대화를 벗어나지 않고 완료됩니다.
      - role: 교육자
        scenario: macOS/Windows에서 튜토리얼 연습 과정을 녹화하고 인라인 문서용 GIF로 내보냅니다. 라이브 세션 중 스크린 캔버스로 슬라이드에 주석을 추가합니다.
  setup:
    eyebrow: 빠른 시작
    title: SnapTray 시작하는 방법
    steps:
      - title: 다운로드 및 설치
        detail: GitHub 릴리스에서 SnapTray를 받거나(macOS DMG, Windows 설치 프로그램, Linux beta AppImage), Microsoft Store에서 Windows 버전을 설치합니다. 실행하면 트레이 아이콘이 즉시 나타납니다.
      - title: 첫 번째 스크린샷 찍기
        detail: F2를 눌러 캡처 오버레이를 엽니다. 드래그하여 영역을 선택하거나, 감지된 창을 클릭합니다. 주석 툴바가 자동으로 표시됩니다.
      - title: 주석 추가, 저장, 공유
        detail: 화살표, 텍스트, 도형, 블러를 추가합니다. Ctrl+C / Cmd+C로 복사, Ctrl+S / Cmd+S로 저장, 또는 Enter로 화면에 고정합니다. 선택적 비밀번호와 함께 공유 링크로 업로드할 수도 있습니다.
  faq:
    eyebrow: 자주 묻는 질문
    title: 스크린샷 도구 — 자주 묻는 질문
    items:
      - q: 스크린샷 도구란 무엇인가요?
        a: 스크린샷 도구는 화면의 일부 또는 전체를 이미지로 캡처하는 소프트웨어입니다. 기본 도구는 이미지를 저장하기만 합니다. SnapTray와 같은 고급 스크린샷 도구는 주석 추가, 화면에 캡처 고정, 링크로 공유도 가능하며, SnapTray는 macOS/Windows에서 동영상 녹화도 지원합니다.
      - q: SnapTray란 무엇인가요?
        a: SnapTray는 macOS, Windows, Ubuntu 22.04 X11 beta용 무료 오픈 소스 스크린샷·주석 도구입니다. 시스템 트레이에 상주하며 즉각적인 영역 캡처, 풍부한 주석, 핀 창, CLI 자동화를 제공합니다. MP4/GIF/WebP 녹화와 OCR은 macOS 및 Windows에서 사용 가능하며, Linux beta는 캡처와 주석에 특화되어 있습니다.
      - q: SnapTray는 무료인가요?
        a: 네. SnapTray는 MIT 라이선스 하에 완전히 무료 오픈 소스입니다. 광고, 구독, 계정, 숨겨진 비용이 없습니다.
      - q: SnapTray와 Snipping Tool의 차이점은 무엇인가요?
        a: Snipping Tool은 최소한의 주석 기능을 가진 기본 캡처를 제공합니다. SnapTray는 지원 플랫폼에서 돋보기, 전체 주석 툴킷(화살표, 도형, 텍스트, 단계 배지, 모자이크 블러), 핀 창, CLI 자동화를 추가합니다. 화면 녹화, GIF/WebP 내보내기, OCR, 자동 블러는 macOS/Windows에서 사용 가능합니다.
      - q: SnapTray와 Lightshot의 차이점은 무엇인가요?
        a: Lightshot은 빠른 캡처와 간단한 주석을 제공하지만 핀 창과 CLI 지원이 없습니다. SnapTray는 지원 플랫폼에서 이를 모두 포함하며, macOS/Windows에서 화면 녹화, OCR, 자동 블러를 제공하면서도 무료, 오픈 소스, 완전 오프라인으로 유지됩니다.
      - q: SnapTray는 어떤 플랫폼을 지원하나요?
        a: SnapTray는 macOS 14+(Apple Silicon 및 Intel), Windows 10+(x64), Ubuntu 22.04 X11 AppImage beta를 지원합니다. 녹화와 OCR은 Linux beta에 포함되지 않으며, Wayland 세션은 지원되지 않습니다.
      - q: 스크립트로 스크린샷을 자동화할 수 있나요?
        a: "네. SnapTray에는 자동화를 위한 CLI가 포함되어 있습니다. Linux beta에서 CLI는 snaptray full, snaptray region, snaptray pin, snaptray config를 지원하며, snaptray record는 macOS/Windows에서만 사용 가능합니다. 셸 스크립트, CI 파이프라인, 자동화 워크플로에 통합하세요."
  cta:
    eyebrow: 시작하기
    title: SnapTray 다운로드 — 무료 오픈 소스
    subtitle: macOS, Windows, Ubuntu 22.04 X11 beta에서 사용 가능합니다. 계정 등록 불필요.
