        values: [true, true, "มีแผนฟรี", false]
  setup:
    eyebrow: บทช่วยสอน
    title: วิธีใช้ SnapTray บน Mac
    steps:
      - title: ติดตั้งจาก DMG
        detail: ดาวน์โหลด DMG จาก GitHub releases ลาก SnapTray ไปยัง Applications และเปิดใช้งาน ให้สิทธิ์บันทึกหน้าจอเมื่อ macOS แจ้งเตือน
      - title: จับภาพส่วน
        detail: กด F2 เพื่อเปิดโอเวอร์เลย์การจับภาพ แว่นขยายจะปรากฏทันที — ลากเพื่อเลือกส่วน หรือคลิกหน้าต่างที่ตรวจพบเพื่อจับภาพ
      - title: มาร์กอัปและส่งออก
        detail: ใช้แถบเครื่องมือเพื่อเพิ่มลูกศร ข้อความ รูปทรง หรือเบลอ กด Cmd+C เพื่อคัดลอก Cmd+S เพื่อบันทึก หรือ Enter เพื่อปักหมุดบนหน้าจอ
  faq:
    eyebrow: FAQ
    title: เครื่องมือสกรีนช็อต Mac — คำถามทั่วไป
    items:
      - q: วิธีจับสกรีนช็อตบน Mac?
        a: "macOS มี Cmd+Shift+4 สำหรับการจับภาพเฉพาะส่วนและ Cmd+Shift+3 สำหรับเต็มหน้าจอ สำหรับเวิร์กโฟลว์ขั้นสูงพร้อมมาร์กอัป บันทึก และแชร์ ติดตั้ง SnapTray และกด F2 — ให้ความแม่นยำจากแว่นขยาย มาร์กอัปทันที และส่งออกด้วยกดปุ่มเดียว"
      - q: SnapTray ทำงานเนทีฟบน Apple Silicon ได้ไหม?
        a: ใช่ SnapTray ส่งมาเป็น universal binary ที่ทำงานเนทีฟทั้งบน Apple Silicon (M1/M2/M3/M4) และ Intel Mac โดยไม่ต้องใช้ Rosetta
      - q: ทำไม macOS ถึงขอสิทธิ์บันทึกหน้าจอ?
        a: macOS ต้องการสิทธิ์บันทึกหน้าจออย่างชัดเจนสำหรับแอปที่จับเนื้อหาบนหน้าจอ SnapTray ต้องการสิ่งนี้เพื่อทำงาน ให้สิทธิ์ใน การตั้งค่าระบบ > ความเป็นส่วนตัวและความปลอดภัย > การบันทึกหน้าจอ
      - q: SnapTray เปรียบกับ CleanShot X อย่างไร?
        a: CleanShot X เป็นแอปเสียเงินพร้อมฟีเจอร์คลาวด์ SnapTray ฟรี โอเพ่นซอร์ส และทำงานออฟไลน์อย่างสมบูรณ์ ทั้งสองมีมาร์กอัป บันทึก และ OCR — แต่ SnapTray เพิ่มระบบอัตโนมัติด้วย CLI และการรองรับหลายแพลตฟอร์มโดยไม่มีค่าใช้จ่าย
      - q: ฉันสามารถบันทึกหน้าจอ Mac ด้วย SnapTray ได้ไหม?
        a: ใช่ SnapTray บันทึกเต็มหน้าจอเป็น MP4 พร้อมเสียงเสริม หรือส่งออกเป็น GIF/WebP สำหรับคลิปไม่มีเสียง การจับเสียงระบบต้องใช้ macOS 13+ หรืออุปกรณ์เสียงเสมือนเช่น BlackHole
      - q: SnapTray ดีกว่า Shottr ไหม?
        a: "Shottr รวดเร็วและมีน้ำหนักเบาแต่ขาดการบันทึกหน้าจอ หน้าต่างปักหมุด และระบบอัตโนมัติด้วย CLI SnapTray มีทั้งหมดนั้นพร้อมเบลออัตโนมัติ ลายน้ำ และการรองรับหลายแพลตฟอร์ม — ขณะที่ยังคงฟรีและโอเพ่นซอร์ส"
  cta:
    eyebrow: เริ่มต้น
    title: ดาวน์โหลด SnapTray สำหรับ macOS
    subtitle: ฟรี โอเพ่นซอร์ส และเนทีฟบน Apple Silicon
    button: ดาวน์โหลด .dmg
    learn_more: ไปที่หน้าหลัก

landing_windows:
  hero:
    title: เครื่องมือสกรีนช็อตที่ดีที่สุดสำหรับ Windows
    intro: "Windows Snipping Tool จัดการการจับภาพพื้นฐานได้ แต่การเริ่มต้นที่ช้า มาร์กอัปที่จำกัด และการขาดการบันทึกทำให้ไม่เพียงพอสำหรับการใช้งานรายวัน หากคุณจับสกรีนช็อตสำหรับเอกสาร รายงานบัก หรือฟีดแบ็กการออกแบบ คุณต้องการมากกว่านี้ SnapTray เป็นเครื่องมือสกรีนช็อตฟรีโอเพ่นซอร์สที่ทดแทน Snipping Tool ด้วยการจับภาพทันที มาร์กอัปที่หลากหลาย บันทึก และระบบอัตโนมัติด้วย CLI"
    cta_download: ดาวน์โหลดสำหรับ Windows
    cta_docs: อ่านเอกสาร
  problems:
    eyebrow: ปัญหา
    title: สิ่งที่ Snipping Tool ทำผิด
    subtitle: ประสบการณ์สกรีนช็อตเริ่มต้นของ Windows ออกแบบมาสำหรับการใช้งานเป็นครั้งคราว ไม่ใช่เวิร์กโฟลว์มืออาชีพ
    items:
      - pain: เริ่มต้นช้า
        detail: Snipping Tool เปิดหน้าต่างเต็มก่อนที่คุณจะจับภาพได้ ภายในเวลาที่โหลดเสร็จ ช่วงเวลาที่คุณต้องการจับภาพอาจหายไปแล้ว
      - pain: มาร์กอัปพื้นฐานเท่านั้น
        detail: ปากกาและไฮไลเตอร์เท่านั้น ไม่มีลูกศร ไม่มีรูปทรง ไม่มีแบดจ์ขั้นตอน ไม่มีเครื่องมือข้อความ ไม่มีโมเสกเบลอ — ไม่มีอะไรสำหรับมาร์กอัปแบบมืออาชีพ
      - pain: ไม่มีการปักหมุดหรืออ้างอิงแบบลอย
        detail: การจับภาพทุกครั้งไปที่หน้าต่างหรือไฟล์ คุณไม่สามารถเก็บสกรีนช็อตให้มองเห็นอยู่บนแอปอื่นเพื่ออ้างอิงอย่างรวดเร็วขณะทำงาน
      - pain: ไม่มี CLI หรือระบบอัตโนมัติ
        detail: ไม่มีอินเตอร์เฟซบรรทัดคำสั่ง คุณไม่สามารถสคริปต์การจับภาพ ผสานกับ CI หรือสร้างระบบอัตโนมัติสำหรับเวิร์กโฟลว์สกรีนช็อตซ้ำๆ ได้
  features:
    eyebrow: วิธีถ่ายสกรีนช็อตที่ดีขึ้นบน Windows
    title: ทำไม SnapTray ถึงทดแทน Snipping Tool ได้
    subtitle: รองรับ High-DPI หลายจอภาพ และมีให้บน Microsoft Store
    items:
      - title: เปิดจากถาดระบบได้ทันที
        body: ทำงานในถาดระบบและจับภาพได้ทันทีด้วย F2 ไม่มีหน้าต่างที่ต้องเปิด ไม่มีแอปที่ต้องสลับ — รวดเร็วกว่าทั้ง Snipping Tool และ Win+Shift+S
      - title: ชุดเครื่องมือมาร์กอัปครบชุด
        body: ลูกศร รูปทรง ข้อความ แบดจ์ขั้นตอน โมเสกเบลอ สติกเกอร์อีโมจิ และเลิกทำ/ทำซ้ำ มาร์กอัปโดยตรงในโอเวอร์เลย์การจับภาพโดยไม่ต้องเปิดโปรแกรมแก้ไขแยกต่างหาก
      - title: High-DPI และหลายจอภาพ
        body: SnapTray จัดการการตั้งค่า DPI แบบผสมและหลายจอภาพได้อย่างถูกต้อง ไม่มีภาพเบลอ ไม่มีส่วนที่คลาดเคลื่อน ไม่มีอาร์ติแฟกต์จากการปรับขนาดบนจอแสดงผล 4K
      - title: บันทึก ปักหมุด และสร้างระบบอัตโนมัติ
        body: "เริ่มบันทึกเต็มหน้าจอเป็น MP4/GIF/WebP จากเมนูถาดระบบหรือปุ่มลัดการบันทึก ปักหมุดภาพที่จับเป็นการอ้างอิงแบบลอย แยกข้อความด้วย OCR และทำเวิร์กโฟลว์สกรีนช็อต การปักหมุด และการตั้งค่าอัตโนมัติผ่าน CLI: snaptray region, snaptray pin, snaptray config"
