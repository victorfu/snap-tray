  setup:
    eyebrow: 教學
    title: 如何在 Windows 上使用 SnapTray
    steps:
      - title: 從商店或 GitHub 安裝
        detail: 從 Microsoft Store 安裝享受自動更新，或從 GitHub Releases 下載獨立安裝程式。啟動後托盤圖示立即出現。
      - title: 擷取區域
        detail: 按 F2 開啟擷取覆蓋層。拖曳選取區域，或點擊偵測到的視窗。標註工具列自動出現，所有工具就緒。
      - title: 標註與匯出
        detail: 加上箭頭、文字、形狀或模糊效果。按 Ctrl+C 複製、Ctrl+S 儲存，或 Enter 釘選在螢幕上。在設定中配置輸出資料夾和快捷鍵，打造你的專屬工作流程。
  faq:
    eyebrow: 常見問題
    title: Windows 截圖工具 — 常見問題
    items:
      - q: 如何在 Windows 上截圖？
        a: Windows 提供 Win+Shift+S 進行基本區域擷取、Print Screen 擷取全螢幕。如需標註、錄影和自動化等進階工作流程，安裝 SnapTray 後按 F2 — 提供放大鏡精準度、即時標註和一鍵匯出。
      - q: SnapTray 支援高 DPI 和 4K 螢幕嗎？
        a: 是的。SnapTray 具備 DPI 感知能力，能正確處理混合 DPI 的多螢幕環境。擷取以原生解析度渲染，不會有縮放異常。
      - q: SnapTray 在 Microsoft Store 上架了嗎？
        a: 是的。從 Microsoft Store 安裝 SnapTray 享受自動更新和沙盒安全性，或從 GitHub Releases 下載獨立安裝程式。
      - q: SnapTray 和 ShareX 有什麼不同？
        a: ShareX 功能強大但設定複雜，有數百個選項。SnapTray 專注於速度和簡潔 — 托盤原生啟動、乾淨的標註工具、釘選視窗和跨平台支援。兩者都是免費開源。
      - q: SnapTray 和 Greenshot 有什麼不同？
        a: Greenshot 提供基本擷取和標註，但缺少螢幕錄影、釘選視窗、OCR、自動模糊和 CLI 自動化。SnapTray 包含所有這些功能，同時還支援 macOS。
      - q: 可以在腳本和自動化中使用 SnapTray 嗎？
        a: 可以。SnapTray 內建完整 CLI：snaptray full、snaptray region、snaptray record、snaptray pin 和 snaptray config。可整合 PowerShell 腳本、批次檔或 CI 流程。
