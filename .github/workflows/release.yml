name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0). Leave empty to use CMakeLists.txt version.'
        required: false
        type: string
  push:
    tags:
      - 'v*'

env:
  APP_NAME: SnapTray
  SPARKLE_VERSION: '2.7.3'
  WINSPARKLE_VERSION: '0.9.2'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      appcast_base_url: ${{ steps.version.outputs.appcast_base_url }}
      macos_appcast_url: ${{ steps.version.outputs.macos_appcast_url }}
      windows_appcast_url: ${{ steps.version.outputs.windows_appcast_url }}
      release_page_url: ${{ steps.version.outputs.release_page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          APPCAST_BASE_URL_OVERRIDE: ${{ vars.SNAPTRAY_APPCAST_BASE_URL }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Extract version from tag (remove 'v' prefix)
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract from CMakeLists.txt
            VERSION=$(grep "project(SnapTray VERSION" CMakeLists.txt | \
                      sed -E 's/.*VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          fi

          if [ -n "$APPCAST_BASE_URL_OVERRIDE" ]; then
            APPCAST_BASE_URL="${APPCAST_BASE_URL_OVERRIDE%/}"
          else
            OWNER="${GITHUB_REPOSITORY_OWNER}"
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
              APPCAST_BASE_URL="https://${OWNER}.github.io"
            else
              APPCAST_BASE_URL="https://${OWNER}.github.io/${REPO_NAME}"
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
          echo "appcast_base_url=$APPCAST_BASE_URL" >> $GITHUB_OUTPUT
          echo "macos_appcast_url=$APPCAST_BASE_URL/updates/macos.xml" >> $GITHUB_OUTPUT
          echo "windows_appcast_url=$APPCAST_BASE_URL/updates/windows.xml" >> $GITHUB_OUTPUT
          echo "release_page_url=https://github.com/${GITHUB_REPOSITORY}/releases/tag/v$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Validate version consistency
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CMAKE_VERSION=$(grep "project(SnapTray VERSION" CMakeLists.txt | \
                          sed -E 's/.*VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          if [ "$TAG_VERSION" != "$CMAKE_VERSION" ]; then
            echo "::error::Version mismatch! Tag version ($TAG_VERSION) != CMakeLists.txt version ($CMAKE_VERSION)"
            echo "Please update CMakeLists.txt to match the tag, or use the correct tag."
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      SNAPTRAY_SPARKLE_PUBLIC_KEY: ${{ secrets.SNAPTRAY_SPARKLE_PUBLIC_KEY }}
      SNAPTRAY_SPARKLE_PRIVATE_KEY: ${{ secrets.SNAPTRAY_SPARKLE_PRIVATE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt via Homebrew
        run: brew install qt@6

      - name: Install build tools
        run: |
          brew install create-dmg ccache
          echo "$(brew --prefix ccache)/libexec" >> $GITHUB_PATH

      # ========================================
      # Compiler Cache
      # ========================================
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-${{ github.ref }}
          restore-keys: |
            macos-refs/heads/main
            macos-

      # ========================================
      # FetchContent Dependencies Cache
      # ========================================
      - name: Generate deps cache key
        id: deps-key
        run: |
          # Extract GIT_TAG lines and generate stable hash
          DEPS_HASH=$(grep -E "GIT_TAG\s+" CMakeLists.txt | sort | shasum -a 256 | cut -c1-16)
          echo "hash=$DEPS_HASH" >> $GITHUB_OUTPUT

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps/opencv-src
            build/_deps/opencv-build
            build/_deps/opencv-subbuild
            build/_deps/libwebp-src
            build/_deps/libwebp-build
            build/_deps/libwebp-subbuild
            build/_deps/qhotkey-src
            build/_deps/qhotkey-build
            build/_deps/qhotkey-subbuild
          key: deps-macos-${{ steps.deps-key.outputs.hash }}
          restore-keys: |
            deps-macos-

      # Code signing step
      # For full Developer ID signing and notarization, set these secrets:
      #   APPLE_CERTIFICATE: Base64-encoded .p12 certificate
      #   APPLE_CERTIFICATE_PASSWORD: Certificate password
      #   APPLE_ID: Apple ID email
      #   APPLE_TEAM_ID: Developer Team ID
      #   APPLE_APP_PASSWORD: App-specific password
      - name: Validate macOS signing secrets (tag release)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          MISSING=0
          for VAR_NAME in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD; do
            if [ -z "${!VAR_NAME}" ]; then
              echo "::error::Missing required secret: $VAR_NAME"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            echo "::error::Release builds require signed and notarized macOS artifacts. Configure all Apple secrets in repository settings."
            exit 1
          fi

      - name: Import Apple Certificate
        if: env.APPLE_CERTIFICATE != ''
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Get signing identity
        id: get-identity
        if: env.APPLE_CERTIFICATE != ''
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "identity=$IDENTITY" >> $GITHUB_OUTPUT

      - name: Validate Sparkle updater secrets
        run: |
          set -euo pipefail
          for VAR_NAME in SNAPTRAY_SPARKLE_PUBLIC_KEY SNAPTRAY_SPARKLE_PRIVATE_KEY; do
            if [ -z "${!VAR_NAME}" ]; then
              echo "::error::Missing required secret: $VAR_NAME"
              exit 1
            fi
          done

      - name: Download Sparkle distribution
        id: sparkle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DIST_DIR="$RUNNER_TEMP/sparkle"
          mkdir -p "$DIST_DIR"

          gh release download "${{ env.SPARKLE_VERSION }}" \
            --repo sparkle-project/Sparkle \
            --pattern "Sparkle-${{ env.SPARKLE_VERSION }}.tar.xz" \
            --dir "$DIST_DIR"

          ARCHIVE_PATH=$(find "$DIST_DIR" -maxdepth 1 -name "Sparkle-${{ env.SPARKLE_VERSION }}.tar.xz" | head -1)
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "::error::Failed to download Sparkle distribution archive."
            exit 1
          fi

          tar -xf "$ARCHIVE_PATH" -C "$DIST_DIR"

          FRAMEWORK_PATH=$(find "$DIST_DIR" -maxdepth 2 -type d -name 'Sparkle.framework' \
            ! -path '*/sparkle.app/*' \
            ! -path '*/Sparkle Test App.app/*' | head -1)
          BIN_DIR=$(find "$DIST_DIR" -maxdepth 2 -type d -name 'bin' | head -1)
          if [ -z "$FRAMEWORK_PATH" ] || [ -z "$BIN_DIR" ]; then
            echo "::error::Failed to extract Sparkle distribution."
            exit 1
          fi

          SPARKLE_ROOT=$(dirname "$FRAMEWORK_PATH")
          echo "root_dir=$SPARKLE_ROOT" >> "$GITHUB_OUTPUT"
          echo "framework=$FRAMEWORK_PATH" >> "$GITHUB_OUTPUT"
          echo "bin_dir=$BIN_DIR" >> "$GITHUB_OUTPUT"

      - name: Import Sparkle EdDSA private key
        run: |
          set -euo pipefail
          PRIVATE_KEY_PATH="$RUNNER_TEMP/sparkle_private_key.pem"
          printf '%s' "$SNAPTRAY_SPARKLE_PRIVATE_KEY" > "$PRIVATE_KEY_PATH"
          "${{ steps.sparkle.outputs.bin_dir }}/generate_keys" -f "$PRIVATE_KEY_PATH"

      - name: Build and Package
        env:
          CODESIGN_IDENTITY: ${{ steps.get-identity.outputs.identity }}
          NOTARIZE_APPLE_ID: ${{ env.APPLE_ID }}
          NOTARIZE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          NOTARIZE_PASSWORD: ${{ env.APPLE_APP_PASSWORD }}
          SPARKLE_FRAMEWORK: ${{ steps.sparkle.outputs.framework }}
          SNAPTRAY_SPARKLE_FEED_URL: ${{ needs.prepare.outputs.macos_appcast_url }}
          SNAPTRAY_SPARKLE_PUBLIC_KEY: ${{ env.SNAPTRAY_SPARKLE_PUBLIC_KEY }}
        run: ./packaging/macos/package.sh

      - name: Generate macOS appcast
        env:
          RELEASE_DOWNLOAD_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare.outputs.tag_name }}
          RELEASE_NOTES_URL: ${{ needs.prepare.outputs.release_page_url }}
        run: |
          set -euo pipefail
          ARCHIVE_PATH=$(find dist -maxdepth 1 -name '*-macOS.dmg' | head -1)
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "::error::macOS DMG not found in dist/."
            exit 1
          fi

          SIGN_OUTPUT="$("${{ steps.sparkle.outputs.bin_dir }}/sign_update" "$ARCHIVE_PATH")"
          SIGNATURE=$(printf '%s\n' "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(printf '%s\n' "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          if [ -z "$SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "::error::Failed to parse Sparkle signature output: $SIGN_OUTPUT"
            exit 1
          fi

          python3 scripts/generate_appcast.py \
            --platform macos \
            --version "${{ needs.prepare.outputs.version }}" \
            --download-url "$RELEASE_DOWNLOAD_BASE_URL/$(basename "$ARCHIVE_PATH")" \
            --signature "$SIGNATURE" \
            --length "$LENGTH" \
            --release-notes-url "$RELEASE_NOTES_URL" \
            --minimum-system-version "14.0.0" \
            --output dist/macos.xml

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            dist/*.dmg
          retention-days: 5

      - name: Upload macOS appcast
        uses: actions/upload-artifact@v4
        with:
          name: macos-appcast
          path: dist/macos.xml
          retention-days: 5

  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      SNAPTRAY_WINSPARKLE_PUBLIC_KEY: ${{ secrets.SNAPTRAY_WINSPARKLE_PUBLIC_KEY }}
      SNAPTRAY_WINSPARKLE_PRIVATE_KEY: ${{ secrets.SNAPTRAY_WINSPARKLE_PRIVATE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt via aqtinstall
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      # ========================================
      # Compiler Cache
      # ========================================
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja -y

      # ========================================
      # FetchContent Dependencies Cache
      # ========================================
      - name: Generate deps cache key
        id: deps-key
        shell: bash
        run: |
          # Extract GIT_TAG lines and generate stable hash
          DEPS_HASH=$(grep -E "GIT_TAG\s+" CMakeLists.txt | sort | sha256sum | cut -c1-16)
          echo "hash=$DEPS_HASH" >> $GITHUB_OUTPUT

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps/opencv-src
            build/_deps/opencv-build
            build/_deps/opencv-subbuild
            build/_deps/libwebp-src
            build/_deps/libwebp-build
            build/_deps/libwebp-subbuild
            build/_deps/qhotkey-src
            build/_deps/qhotkey-build
            build/_deps/qhotkey-subbuild
          key: deps-windows-${{ steps.deps-key.outputs.hash }}
          restore-keys: |
            deps-windows-

      - name: Install NSIS
        run: choco install nsis -y

      - name: Verify NSIS installation
        shell: pwsh
        run: |
          $nsispath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $nsispath) {
            Write-Output "NSIS found at: $nsispath"
            & $nsispath /VERSION
          } else {
            Write-Error "NSIS not found at expected location: $nsispath"
            exit 1
          }

      - name: Validate WinSparkle updater secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SNAPTRAY_WINSPARKLE_PUBLIC_KEY)) {
            throw "Missing required secret: SNAPTRAY_WINSPARKLE_PUBLIC_KEY"
          }
          if ([string]::IsNullOrWhiteSpace($env:SNAPTRAY_WINSPARKLE_PRIVATE_KEY)) {
            throw "Missing required secret: SNAPTRAY_WINSPARKLE_PRIVATE_KEY"
          }

      - name: Download WinSparkle distribution
        id: winsparkle
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $distDir = Join-Path $env:RUNNER_TEMP "winsparkle"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          gh release download "v${{ env.WINSPARKLE_VERSION }}" `
            --repo vslavik/winsparkle `
            --pattern "WinSparkle-${{ env.WINSPARKLE_VERSION }}.zip" `
            --dir $distDir

          $archive = Get-ChildItem -Path $distDir -Filter "WinSparkle-${{ env.WINSPARKLE_VERSION }}.zip" | Select-Object -First 1
          if (-not $archive) {
            throw "Failed to download WinSparkle binary archive."
          }

          $extractDir = Join-Path $distDir "extracted"
          Expand-Archive -Path $archive.FullName -DestinationPath $extractDir -Force

          $rootDir = Get-ChildItem -Path $extractDir -Directory |
            Where-Object { $_.Name -like "WinSparkle-*" } |
            Select-Object -First 1
          if (-not $rootDir) {
            throw "Failed to locate extracted WinSparkle root directory."
          }

          $dllCandidates = @(
            (Join-Path $rootDir.FullName "x64/Release/WinSparkle.dll"),
            (Join-Path $rootDir.FullName "Release/WinSparkle.dll"),
            (Join-Path $rootDir.FullName "ARM64/Release/WinSparkle.dll")
          )
          $dll = $dllCandidates |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1
          if (-not $dll) {
            $dll = Get-ChildItem -Path $rootDir.FullName -Recurse -Filter "WinSparkle.dll" |
              Select-Object -ExpandProperty FullName -First 1
          }

          $tool = Join-Path $rootDir.FullName "bin/winsparkle-tool.exe"
          if (-not (Test-Path $tool)) {
            $tool = Get-ChildItem -Path $rootDir.FullName -Recurse -Filter "winsparkle-tool.exe" |
              Select-Object -ExpandProperty FullName -First 1
          }

          if (-not $dll -or -not $tool) {
            throw "Failed to locate WinSparkle.dll or winsparkle-tool.exe in the downloaded archive."
          }

          "dll_path=$dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tool_path=$tool" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build and Package NSIS
        shell: cmd
        env:
          QT_PATH: ${{ env.QT_ROOT_DIR }}
          SCCACHE_GHA_ENABLED: "true"
          WINSPARKLE_DLL: ${{ steps.winsparkle.outputs.dll_path }}
          SNAPTRAY_WINSPARKLE_APPCAST_URL: ${{ needs.prepare.outputs.windows_appcast_url }}
          SNAPTRAY_WINSPARKLE_PUBLIC_KEY: ${{ env.SNAPTRAY_WINSPARKLE_PUBLIC_KEY }}
        run: packaging\windows\package.bat nsis

      - name: Generate Windows appcast
        shell: pwsh
        env:
          RELEASE_DOWNLOAD_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare.outputs.tag_name }}
          RELEASE_NOTES_URL: ${{ needs.prepare.outputs.release_page_url }}
        run: |
          $setupExe = Get-ChildItem -Path . -Recurse -Filter "*-Setup.exe" |
            Select-Object -First 1
          if (-not $setupExe) {
            throw "NSIS setup executable not found in the workspace."
          }

          $privateKeyPath = Join-Path $env:RUNNER_TEMP "winsparkle-private.key"
          Set-Content -Path $privateKeyPath -Value $env:SNAPTRAY_WINSPARKLE_PRIVATE_KEY -Encoding utf8NoBOM

          $signOutput = & "${{ steps.winsparkle.outputs.tool_path }}" sign --verbose -f $privateKeyPath $setupExe.FullName
          $signatureMatch = [regex]::Match($signOutput, 'sparkle:edSignature="([^"]+)"')
          $lengthMatch = [regex]::Match($signOutput, 'length="([^"]+)"')

          if ($signatureMatch.Success -and $lengthMatch.Success) {
            $signature = $signatureMatch.Groups[1].Value
            $length = $lengthMatch.Groups[1].Value
          } else {
            $rawSignature = ($signOutput | Out-String).Trim()
            if ([string]::IsNullOrWhiteSpace($rawSignature)) {
              throw "WinSparkle signing returned empty output."
            }
            $signature = $rawSignature
            $length = (Get-Item $setupExe.FullName).Length
          }

          python scripts/generate_appcast.py `
            --platform windows `
            --version "${{ needs.prepare.outputs.version }}" `
            --download-url "$env:RELEASE_DOWNLOAD_BASE_URL/$($setupExe.Name)" `
            --signature $signature `
            --length $length `
            --release-notes-url "$env:RELEASE_NOTES_URL" `
            --output dist/windows.xml

      - name: Show sccache stats
        if: always()
        shell: cmd
        run: sccache --show-stats

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: dist/*.exe
          retention-days: 5

      - name: Upload Windows appcast
        uses: actions/upload-artifact@v4
        with:
          name: windows-appcast
          path: dist/windows.xml
          retention-days: 5

  release:
    needs: [prepare, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ env.APP_NAME }} ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-nsis/*.exe

  deploy-appcasts:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download appcast artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble Pages site
        run: |
          set -euo pipefail
          mkdir -p site/updates
          cp artifacts/macos-appcast/macos.xml site/updates/macos.xml
          cp artifacts/windows-appcast/windows.xml site/updates/windows.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
