      - feature: Screen recording
        values: [true, "QuickTime only", false, true]
      - feature: GIF / WebP export
        values: [true, false, false, true]
      - feature: OCR text extraction
        values: [true, false, true, true]
      - feature: Auto blur
        values: [true, false, false, true]
