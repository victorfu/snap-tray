landing_screenshot_tool:
  hero:
    title: 最佳截圖工具 — 快速擷取螢幕畫面
    intro: "截圖工具可以將螢幕上的任何區域擷取為圖片 — 用於文件、錯誤回報、教學或快速分享。大多數作業系統都內建基本截圖功能，但內建工具止步於擷取。如果你經常需要標註、錄影或分享截圖，你需要一個為這些工作流程而打造的工具。SnapTray 是一款免費開源的截圖工具，支援 macOS 與 Windows，將擷取、標註、錄影和分享整合在一個應用程式中。"
    cta_download: 免費下載
    cta_docs: 閱讀文件
  problems:
    eyebrow: 問題所在
    title: 為什麼內建截圖工具不夠用
    subtitle: Windows 和 macOS 的預設工具是為偶爾使用而設計，不適合每天的工作流程。
    items:
      - pain: Windows 剪取工具既慢又陽春
        detail: 剪取工具需要先開啟完整視窗才能擷取。標註只有畫筆和螢光筆 — 沒有箭頭、形狀或文字。沒有 CLI、沒有釘選功能、沒有錄影管線。
      - pain: Mac 截圖缺少後製工具
        detail: Cmd+Shift+4 可以擷取區域，但也僅止於此。要標註必須開啟預覽程式或第三方編輯器。沒有釘選視窗、沒有區域錄影、沒有 OCR。
      - pain: 第三方工具臃腫或需要付費
        detail: 許多替代方案需要帳號、雲端訂閱，或以笨重的 Electron 應用程式運行。簡單的擷取標註工作流程不應該需要 500 MB 記憶體或月費。
  features:
    eyebrow: 解決方案
    title: SnapTray 如何解決這些問題
    subtitle: 一個輕量的常駐托盤工具，三步驟取代你的內建截圖工作流程。
    items:
      - title: 即時擷取任意區域
        body: 按 F2 啟動擷取覆蓋層。放大鏡提供像素級精準度，視窗偵測讓你一鍵選取整個視窗。不需切換應用程式，不需等待載入。
      - title: 不離開擷取畫面直接標註
        body: 箭頭、形狀、文字、步驟標記、馬賽克模糊和貼圖都在同一個覆蓋層中。不需開啟其他編輯器或貼到別的應用程式。
      - title: 分享、儲存或釘選結果
        body: 複製到剪貼簿、存檔、上傳取得分享連結，或釘選為浮動參考視窗。螢幕錄影可匯出 MP4、GIF 或 WebP。每個動作只需一個快捷鍵。
  compare:
    eyebrow: 工具比較
    title: "SnapTray vs 剪取工具 vs Lightshot vs ShareX"
    feature_label: 功能
    tools:
      - SnapTray
      - 剪取工具
      - Lightshot
      - ShareX
