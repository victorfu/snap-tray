landing_screenshot_tool:
  hero:
    title: Best Screenshot Tool for Fast Capture
    intro: "A screenshot tool captures any part of your screen as an image — for documentation, bug reports, tutorials, or quick sharing. Most operating systems include a basic one, but built-in tools stop at capture. If you annotate, record, or share screenshots regularly, you need a tool built for that workflow. SnapTray is a free, open-source screenshot tool for macOS and Windows that handles capture, annotation, recording, and sharing in one place."
    cta_download: Download Free
    cta_docs: Read the Docs
  problems:
    eyebrow: The Problem
    title: Why Built-in Screenshot Tools Fall Short
    subtitle: Default tools on Windows and macOS were designed for occasional use, not daily workflows.
    items:
      - pain: Windows Snipping Tool Is Slow and Basic
        detail: Snipping Tool opens a full window before you can capture. Annotation is limited to a pen and highlighter — no arrows, shapes, or text. There is no CLI, no pin-to-screen, and no recording pipeline.
      - pain: Mac Screenshots Lack Post-Capture Tools
        detail: Cmd+Shift+4 captures a region, but that is where it ends. To annotate, you need Preview or a third-party editor. There is no pin window, no screen recording with region selection, and no OCR.
      - pain: Third-Party Tools Are Bloated or Paid
        detail: Many alternatives require accounts, cloud subscriptions, or ship as heavy Electron apps. Simple capture-and-annotate workflows should not need 500 MB of RAM or a monthly fee.
  features:
    eyebrow: The Solution
    title: How SnapTray Solves This
    subtitle: A lightweight, tray-resident tool that replaces your built-in screenshot workflow in three steps.
    items:
      - title: Capture Any Region Instantly
        body: Press F2 to launch the capture overlay. A magnifier gives you pixel-level precision, and window detection lets you select entire windows with one click. No app switching, no loading screen.
      - title: Annotate Without Leaving the Capture
        body: Arrows, shapes, text, step badges, mosaic blur, and emoji stickers appear in the same overlay. You do not need to open a separate editor or paste into another app.
      - title: Share, Save, or Pin the Result
        body: Copy to clipboard, save to disk, upload for a share link, or pin as a floating reference window. Screen recordings export to MP4, GIF, or WebP. Every action is one keystroke away.
  compare:
    eyebrow: Comparison
    title: "SnapTray vs Snipping Tool vs Lightshot vs ShareX"
    feature_label: Feature
    tools:
      - SnapTray
      - Snipping Tool
      - Lightshot
      - ShareX
    rows:
      - feature: Region capture with magnifier
        values: [true, false, false, true]
      - feature: Built-in annotation tools
        values: [true, false, true, true]
      - feature: Pin to screen
        values: [true, false, false, false]
      - feature: Screen recording (MP4)
        values: [true, true, false, true]
      - feature: GIF / WebP export
        values: [true, false, false, true]
      - feature: OCR text extraction
        values: [true, false, false, true]
      - feature: Auto blur (faces / credentials)
        values: [true, false, false, false]
      - feature: CLI automation
        values: [true, false, false, true]
      - feature: Cross-platform (macOS + Windows)
        values: [true, false, false, false]
      - feature: Free and open source
        values: [true, true, true, true]
  usecases:
    eyebrow: Use Cases
    title: Who Uses a Screenshot Tool Daily
    items:
      - role: Developers
        scenario: Capture error traces, annotate architecture diagrams, record reproduction steps for bug reports — then paste directly into GitHub issues or Slack.
      - role: Designers
        scenario: Pin reference images on screen, compare layouts side by side, measure pixel distances, and export annotated feedback for developers.
      - role: Support Teams
        scenario: Screenshot customer issues, add step-badge annotations, blur sensitive data, and share a link — all without leaving the conversation.
      - role: Educators
        scenario: Record tutorial walkthroughs, annotate slides during live sessions with Screen Canvas, and export GIFs for inline documentation.
  setup:
    eyebrow: Quick Start
    title: How to Start Using SnapTray
    steps:
      - title: Download and Install
        detail: Get SnapTray from GitHub releases (macOS DMG or Windows installer) or the Microsoft Store. Launch it — the tray icon appears immediately.
      - title: Take Your First Screenshot
        detail: Press F2 to open the capture overlay. Drag to select a region, or click a detected window. The annotation toolbar appears automatically.
      - title: Annotate, Save, and Share
        detail: Add arrows, text, shapes, or blur. Press Ctrl+C / Cmd+C to copy, Ctrl+S / Cmd+S to save, or Enter to pin on screen. Upload for a share link with optional password.
  faq:
    eyebrow: FAQ
    title: Screenshot Tool — Frequently Asked Questions
    items:
      - q: What is a screenshot tool?
        a: A screenshot tool is software that captures part or all of your screen as an image. Basic tools only save the image. Advanced screenshot tools like SnapTray also let you annotate, record video, pin captures on screen, and share with a link.
      - q: What is SnapTray?
        a: SnapTray is a free, open-source screenshot and screen recording tool for macOS and Windows. It lives in your system tray and provides instant region capture, rich annotation, pin windows, MP4/GIF/WebP recording, OCR, auto blur, and CLI automation.
      - q: Is SnapTray free?
        a: Yes. SnapTray is completely free and open source under the MIT license. There are no ads, subscriptions, accounts, or hidden costs.
      - q: How is SnapTray different from Snipping Tool?
        a: Snipping Tool offers basic capture with minimal annotation. SnapTray adds a magnifier, full annotation toolkit (arrows, shapes, text, step badges, mosaic blur), pin windows, screen recording, GIF/WebP export, OCR, auto blur, and CLI automation — all free and cross-platform.
      - q: How is SnapTray different from Lightshot?
        a: Lightshot provides quick capture and simple annotation, but lacks screen recording, pin windows, OCR, auto blur, and CLI support. SnapTray includes all of these features while remaining free, open source, and fully offline.
      - q: Does SnapTray work on both macOS and Windows?
        a: Yes. SnapTray supports macOS 14+ (Apple Silicon and Intel) and Windows 10+ (x64). The same feature set is available on both platforms.
      - q: Can I automate screenshots with scripts?
        a: "Yes. SnapTray includes a full CLI: snaptray full, snaptray region, snaptray record, snaptray pin, and snaptray config. Integrate into shell scripts, CI pipelines, or automation workflows."
  cta:
    eyebrow: Get Started
    title: Download SnapTray — Free and Open Source
    subtitle: Available for macOS and Windows. No account required.
    button: Download Now
    learn_more: Visit Homepage

