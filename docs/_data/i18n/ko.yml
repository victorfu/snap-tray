    items:
      - q: Windows에서 스크린샷을 찍는 방법은?
        a: "Windows는 기본 영역 캡처에 Win+Shift+S, 전체 화면에 Print Screen을 제공합니다. 주석, 녹화, 자동화를 포함한 고급 워크플로에는 SnapTray를 설치하고 F2를 누르세요. 돋보기 정밀도, 즉각적인 주석, 원키 내보내기를 제공합니다."
      - q: SnapTray가 고DPI와 4K 디스플레이를 처리하나요?
        a: 네. SnapTray는 DPI 인식이며 혼합 DPI 다중 모니터 설정을 올바르게 처리합니다. 캡처는 스케일링 아티팩트 없이 네이티브 해상도로 렌더링됩니다.
      - q: SnapTray가 Microsoft Store에서 제공되나요?
        a: 네. 자동 업데이트와 샌드박스 보안을 위해 Microsoft Store에서 SnapTray를 설치하거나, GitHub 릴리스에서 독립 설치 프로그램을 다운로드할 수 있습니다.
      - q: SnapTray와 ShareX의 차이점은 무엇인가요?
        a: ShareX는 강력하지만 수백 가지 설정으로 복잡합니다. SnapTray는 속도와 단순함에 집중합니다. 트레이 기반 실행, 깔끔한 주석 도구, 핀 창, 크로스 플랫폼 지원. 둘 다 무료 오픈 소스입니다.
      - q: SnapTray와 Greenshot의 차이점은 무엇인가요?
        a: Greenshot은 기본 캡처와 주석을 제공하지만 화면 녹화, 핀 창, OCR, 자동 블러, CLI 자동화가 없습니다. SnapTray는 지원 플랫폼에서 핀 창과 CLI 자동화를 추가하며, macOS/Windows에서는 녹화, OCR, 자동 블러도 제공합니다. 또한 macOS와 스크린샷·주석 워크플로를 위한 Linux beta도 지원합니다.
      - q: SnapTray를 스크립트와 자동화에 사용할 수 있나요?
        a: "네. SnapTray에는 전체 CLI가 포함되어 있습니다: snaptray full, snaptray region, snaptray record, snaptray pin, snaptray config. PowerShell 스크립트, 배치 파일, CI 파이프라인에 통합하세요."
