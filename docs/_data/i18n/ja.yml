  setup:
    eyebrow: チュートリアル
    title: Mac で SnapTray を使う方法
    steps:
      - title: DMG からインストール
        detail: GitHub リリースから DMG をダウンロードし、SnapTray をアプリケーションにドラッグして起動します。macOS のプロンプトが表示されたら画面収録の許可を付与してください。
      - title: 範囲をキャプチャ
        detail: F2 を押してキャプチャオーバーレイを開きます。ルーペが即座に表示されます。ドラッグして範囲を選択するか、検出されたウィンドウをクリックしてキャプチャします。
      - title: 注釈とエクスポート
        detail: ツールバーを使って矢印、テキスト、図形、ぼかしを追加します。Cmd+C でコピー、Cmd+S で保存、Enter で画面にピン留め。
  faq:
    eyebrow: よくある質問
    title: Mac スクリーンショットツール — よくある質問
    items:
      - q: Mac でスクリーンショットを撮るには？
        a: "macOS は範囲キャプチャに Cmd+Shift+4、フルスクリーンに Cmd+Shift+3 を提供しています。注釈、録画、共有を含む高度なワークフローには、SnapTray をインストールして F2 を押してください。ルーペ精度、即座の注釈、ワンキーエクスポートを提供します。"
      - q: SnapTray は Apple Silicon でネイティブ動作しますか？
        a: はい。SnapTray はユニバーサルバイナリとして提供され、Apple Silicon（M1/M2/M3/M4）と Intel Mac の両方で Rosetta トランスレーションなしにネイティブ動作します。
      - q: macOS が画面収録の許可を求めるのはなぜですか？
        a: macOS は画面コンテンツをキャプチャするアプリに対して明示的な画面収録の許可を要求します。SnapTray の動作にはこれが必要です。システム設定 > プライバシーとセキュリティ > 画面収録 で許可してください。
      - q: SnapTray は CleanShot X と比べてどうですか？
        a: CleanShot X はクラウド機能を持つ有料アプリです。SnapTray は無料でオープンソース、完全オフラインです。どちらも注釈、録画、OCR を提供しますが、SnapTray は CLI 自動化とクロスプラットフォームサポートを無料で追加します。
      - q: SnapTray で Mac の画面を録画できますか？
        a: はい。SnapTray はフルスクリーンを音声付きで MP4 に録画するか、無音クリップ用に GIF/WebP にエクスポートします。システム音声のキャプチャには macOS 13+ または BlackHole などの仮想オーディオデバイスが必要です。
      - q: SnapTray は Shottr より優れていますか？
        a: "Shottr は高速で軽量ですが、画面録画、ピン留めウィンドウ、CLI 自動化が欠けています。SnapTray はこれらすべてに加えて自動ぼかし、透かし、クロスプラットフォームサポートを提供しながら、無料でオープンソースです。"
