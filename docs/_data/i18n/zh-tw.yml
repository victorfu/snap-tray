landing_screenshot_tool:
  hero:
    title: 快速截圖工具 — 擷取、標註、分享一氣呵成
    intro: "不用再切換多個應用程式來截圖、標註和分享。SnapTray 常駐系統托盤，一秒內啟動 — 按 F2、拖曳區域、標註重點、立即發送。無需等待載入、無需註冊、完全離線運作。"
    cta_download: 免費下載
    cta_docs: 閱讀文件
  features:
    eyebrow: 使用流程
    title: 三步完成：從螢幕到分享
    subtitle: 精簡的截圖流程，消除傳統工具的繁瑣操作。
    items:
      - title: 擷取任意區域
        body: 按下 F2 拖曳選取。放大鏡提供像素級精準度，視窗偵測讓你一鍵選取整個視窗。
      - title: 即時標註
        body: 箭頭、形狀、文字、步驟標記、馬賽克模糊 — 截圖後立即可用，不需開啟其他編輯器。
      - title: 立即分享或儲存
        body: 複製到剪貼簿、存檔、釘選為浮動參考、或上傳取得分享連結。每個動作只需一個快捷鍵。
