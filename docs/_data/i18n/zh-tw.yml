    eyebrow: 使用情境
    title: 為每天都在截圖的人而打造
    items:
      - role: 開發者
        scenario: 擷取錯誤訊息、標註架構圖、錄製重現步驟 — 直接貼到 GitHub Issue 或 Slack。
      - role: 客服團隊
        scenario: 截圖客戶問題、加上步驟標記、模糊敏感資料、分享連結 — 全程不離開對話視窗。
      - role: 設計師
        scenario: 釘選參考圖、並排比較版面、量測像素距離、匯出標註回饋給開發者。
      - role: 教育工作者
        scenario: 錄製教學影片、用螢幕畫布在簡報上即時標註、匯出 GIF 嵌入文件。
