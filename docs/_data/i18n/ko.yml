hero:
  eyebrow: 캡처. 주석. 녹화.
  title: Mac·Windows·Linux beta를 위한 빠른 스크린샷 도구
  tagline: SnapTray는 시스템 트레이에 상주하며 즉시 실행되어 정밀한 캡처와 세련된 주석 작업을 지원합니다. 녹화와 OCR은 macOS/Windows에서 사용 가능하며, Linux beta는 스크린샷과 주석에 특화되어 있습니다.
  cta_download: 다운로드
  cta_github: GitHub에서 보기
  pills:
    - macOS 14+
    - Windows 10+
    - Ubuntu 22.04 X11 beta
    - Qt 6.10.1
  runtime_title: SnapTray 런타임
  runtime_items:
    - 돋보기 정밀도를 갖춘 영역 캡처
    - 스크린 캔버스 + 풍부한 주석 도구
    - macOS/Windows에서 MP4 / GIF / WebP 녹화
    - macOS/Windows에서 OCR, 자동 블러, 워터마크, 핀 창

features:
  eyebrow: 기능 목록
  title: 빠르고 전문적인 캡처 워크플로를 위해 설계
  subtitle: 단발 스크린샷부터 macOS/Windows 녹화 세션까지, SnapTray는 모든 캡처 작업을 트레이 기반의 단일 워크플로에서 처리합니다.
  items:
    - kind: Capture
      title: 영역 캡처
      body: 정밀한 크로스헤어와 돋보기로 대상을 지정합니다. F2를 눌러 즉시 시작하세요.
    - kind: Canvas
      title: 스크린 캔버스
      body: Ctrl+F2 / Cmd+F2로 데스크톱 위에 직접 그리고 그 자리에서 주석을 추가합니다.
    - kind: Pinning
      title: 화면에 고정
      body: 참조 이미지를 다른 창 위에 항상 표시합니다. 크기 조정과 회전을 자유롭게 할 수 있습니다.
    - kind: Annotation
      title: 풍부한 도구 세트
      body: 화살표, 펜, 마커, 도형, 텍스트, 모자이크, 단계 배지, 이모지 스티커.
    - kind: Automation
      title: OCR + 자동 블러
      body: macOS/Windows에서 텍스트를 추출하고 민감한 얼굴이나 자격 증명을 자동으로 마스킹하여 안전하게 공유합니다.
    - kind: Detection
      title: 창 감지
      body: 정확한 경계를 수동으로 드래그하지 않고도 창을 빠르게 선택합니다.
    - kind: Recording
      title: 화면 녹화
      body: macOS/Windows에서 전체 화면을 녹화하고 선택적 오디오를 포함한 MP4로 내보내거나, 무음 클립용 GIF/WebP로 저장할 수 있습니다.
    - kind: Utility
      title: 색상 선택기
      body: 화면 색상을 선택하고, Shift로 HEX/RGB를 전환하며, C로 즉시 복사합니다.
    - kind: Control
      title: 실행 취소 / 다시 실행
      body: 주석 작업 전반에 걸친 완전한 작업 기록으로 편집 내용을 언제든 되돌릴 수 있습니다.
    - kind: Sharing
      title: URL 공유
      body: 캡처를 업로드하고 선택적 비밀번호 보호와 함께 공유 링크를 생성합니다.
    - kind: Branding
      title: 워터마크
      body: 스크린샷과 macOS/Windows 녹화에 커스텀 이미지 워터마크 오버레이를 적용합니다.
    - kind: Workflow
      title: 단축키 우선
      body: 영역 캡처, 캔버스, 붙여넣기, 빠른 고정, 핀 표시/숨기기를 모두 단 한 번의 키 입력으로 실행할 수 있습니다.

