  usecases:
    eyebrow: กรณีการใช้งาน
    title: ใครใช้เครื่องมือสกรีนช็อตเป็นประจำทุกวัน
    items:
      - role: นักพัฒนา
        scenario: จับภาพ error trace มาร์กอัปแผนภาพสถาปัตยกรรม และบน macOS/Windows บันทึกขั้นตอนการทำซ้ำสำหรับรายงานบัก — แล้ววางลงใน GitHub issues หรือ Slack ได้โดยตรง
      - role: นักออกแบบ
        scenario: ปักหมุดภาพอ้างอิงบนหน้าจอ เปรียบเทียบเลย์เอาต์แบบเคียงข้างกัน วัดระยะพิกเซล และส่งออกฟีดแบ็กที่มาร์กอัปแล้วให้นักพัฒนา
      - role: ทีมสนับสนุน
        scenario: จับภาพปัญหาของลูกค้า ใส่มาร์กอัปแบดจ์ขั้นตอน และเบลอข้อมูลสำคัญ — ทั้งหมดโดยไม่ต้องออกจากการสนทนา
      - role: นักการศึกษา
        scenario: บน macOS/Windows บันทึกวิดีโอสาธิตบทช่วยสอนและส่งออกเป็น GIF สำหรับเอกสารแบบอินไลน์ ใช้สกรีนแคนวาสมาร์กอัปสไลด์ระหว่างเซสชันสด
  setup:
    eyebrow: เริ่มต้นอย่างรวดเร็ว
    title: วิธีเริ่มใช้ SnapTray
    steps:
      - title: ดาวน์โหลดและติดตั้ง
        detail: รับ SnapTray จาก GitHub releases (macOS DMG, ตัวติดตั้ง Windows หรือ Linux beta AppImage) หรือติดตั้งเวอร์ชัน Windows จาก Microsoft Store เปิดใช้งาน — ไอคอนถาดระบบจะปรากฏขึ้นทันที
      - title: จับสกรีนช็อตครั้งแรก
        detail: กด F2 เพื่อเปิดโอเวอร์เลย์การจับภาพ ลากเพื่อเลือกส่วน หรือคลิกหน้าต่างที่ตรวจพบ แถบเครื่องมือมาร์กอัปจะปรากฏโดยอัตโนมัติ
      - title: มาร์กอัป บันทึก และปักหมุด
        detail: เพิ่มลูกศร ข้อความ รูปทรง หรือเบลอ กด Ctrl+C / Cmd+C เพื่อคัดลอก Ctrl+S / Cmd+S เพื่อบันทึก หรือ Enter เพื่อปักหมุดบนหน้าจอ
  faq:
    eyebrow: FAQ
    title: คำถามที่พบบ่อย — เครื่องมือสกรีนช็อต
    items:
      - q: เครื่องมือสกรีนช็อตคืออะไร?
        a: เครื่องมือสกรีนช็อตคือซอฟต์แวร์ที่จับภาพส่วนหนึ่งหรือทั้งหมดของหน้าจอเป็นรูปภาพ เครื่องมือพื้นฐานจะบันทึกภาพเท่านั้น เครื่องมือสกรีนช็อตขั้นสูงอย่าง SnapTray ยังช่วยให้คุณมาร์กอัปและปักหมุดภาพที่จับบนหน้าจอได้ SnapTray บันทึกวิดีโอบน macOS/Windows ด้วย
      - q: SnapTray คืออะไร?
        a: SnapTray เป็นเครื่องมือสกรีนช็อตและมาร์กอัปฟรีโอเพ่นซอร์สสำหรับ macOS, Windows และ Ubuntu 22.04 X11 beta อยู่ในถาดระบบและให้การจับภาพเฉพาะส่วนทันที มาร์กอัปที่หลากหลาย หน้าต่างปักหมุด และระบบอัตโนมัติด้วย CLI การบันทึก MP4/GIF/WebP และ OCR ใช้ได้บน macOS และ Windows; Linux beta เน้นที่การจับภาพและมาร์กอัป
      - q: SnapTray ฟรีหรือไม่?
        a: ใช่ SnapTray ฟรีทั้งหมดและเป็นโอเพ่นซอร์สภายใต้ลิขสิทธิ์ MIT ไม่มีโฆษณา การสมัครสมาชิก บัญชี หรือค่าใช้จ่ายซ่อนเร้น
      - q: SnapTray ต่างจาก Snipping Tool อย่างไร?
        a: Snipping Tool ให้การจับภาพพื้นฐานพร้อมมาร์กอัปขั้นต่ำ SnapTray เพิ่มแว่นขยาย ชุดเครื่องมือมาร์กอัปครบชุด (ลูกศร รูปทรง ข้อความ แบดจ์ขั้นตอน โมเสกเบลอ) หน้าต่างปักหมุด และระบบอัตโนมัติด้วย CLI สำหรับแพลตฟอร์มที่รองรับ; การบันทึกหน้าจอ ส่งออก GIF/WebP OCR และเบลออัตโนมัติใช้ได้บน macOS/Windows
      - q: SnapTray ต่างจาก Lightshot อย่างไร?
        a: Lightshot ให้การจับภาพอย่างรวดเร็วและมาร์กอัปง่ายๆ แต่ขาดหน้าต่างปักหมุดและการรองรับ CLI SnapTray มีสิ่งเหล่านั้นสำหรับแพลตฟอร์มที่รองรับ พร้อมการบันทึกหน้าจอ OCR และเบลออัตโนมัติบน macOS/Windows ขณะที่ยังคงฟรี โอเพ่นซอร์ส และทำงานออฟไลน์ได้อย่างสมบูรณ์
      - q: SnapTray รองรับแพลตฟอร์มใดบ้าง?
        a: SnapTray รองรับ macOS 14+ (Apple Silicon และ Intel) Windows 10+ (x64) และ Ubuntu 22.04 X11 AppImage beta การบันทึกหน้าจอและ OCR ไม่รวมใน Linux beta และไม่รองรับ Wayland session
      - q: ฉันสามารถสร้างระบบอัตโนมัติสกรีนช็อตด้วยสคริปต์ได้ไหม?
        a: "ใช่ SnapTray มี CLI สำหรับระบบอัตโนมัติของสกรีนช็อต การปักหมุด และการตั้งค่า คำสั่งทั่วไปได้แก่ snaptray full, snaptray screen, snaptray region, snaptray pin และ snaptray config รวมเข้ากับ shell script, CI pipeline หรือเวิร์กโฟลว์อัตโนมัติ"
  cta:
    eyebrow: เริ่มต้น
    title: ดาวน์โหลด SnapTray — ฟรีและโอเพ่นซอร์ส
    subtitle: ใช้ได้สำหรับ macOS, Windows และ Ubuntu 22.04 X11 beta ไม่ต้องสร้างบัญชี
    button: ดาวน์โหลดเดี๋ยวนี้
    learn_more: ไปที่หน้าหลัก

landing_mac:
  hero:
    title: เครื่องมือสกรีนช็อตที่ดีที่สุดสำหรับ Mac
    intro: "macOS มี Cmd+Shift+4 สำหรับการจับภาพหน้าจอพื้นฐาน แต่หยุดอยู่แค่นั้น — ไม่มีการมาร์กอัป ไม่มีหน้าต่างปักหมุด ไม่มีเวิร์กโฟลว์บันทึก MP4/GIF/WebP ไม่มี OCR หากคุณจับสกรีนช็อตเป็นประจำทุกวันเพื่องาน คุณต้องการเครื่องมือที่จัดการเวิร์กโฟลว์ทั้งหมดได้ SnapTray เป็นเครื่องมือสกรีนช็อตฟรีโอเพ่นซอร์สที่เพิ่มการจับภาพ มาร์กอัป บันทึก และแชร์แบบมืออาชีพให้กับ Mac ของคุณ"
    cta_download: ดาวน์โหลด .dmg
    cta_docs: อ่านเอกสาร
  problems:
    eyebrow: ปัญหา
    title: ทำไม Cmd+Shift+4 ถึงไม่เพียงพอ
    subtitle: เครื่องมือสกรีนช็อตในตัวของ macOS จัดการการจับภาพพื้นฐานได้ แต่ไม่เพียงพอสำหรับเวิร์กโฟลว์มืออาชีพ
    items:
      - pain: ไม่มีการมาร์กอัปหลังจับภาพ
        detail: macOS บันทึกภาพดิบ ในการเพิ่มลูกศร ข้อความ หรือเบลอ คุณต้องเปิด Preview หรือโปรแกรมแก้ไขของบุคคลที่สาม — ขัดจังหวะการทำงานทุกครั้ง
      - pain: ไม่มีการปักหมุดหรืออ้างอิงแบบลอย
        detail: คุณไม่สามารถเก็บสกรีนช็อตให้มองเห็นได้ขณะทำงาน การจับภาพทุกครั้งหายไปในไฟล์ บังคับให้สลับหน้าต่างตลอดเวลา
      - pain: ไม่มีกระบวนการบันทึกหน้าจอ
        detail: QuickTime Player บันทึกเต็มหน้าจอ แต่ไม่มีการเลือกส่วน ไม่มีการหยุดชั่วคราว/ดำเนินการต่อ และไม่มีการส่งออก GIF หรือ WebP สำหรับการแชร์อย่างรวดเร็ว
      - pain: ไม่มี OCR หรือการสแกน QR code
        detail: การแยกข้อความจากสกรีนช็อตต้องพิมพ์ใหม่ด้วยมือ ไม่มีวิธีในตัวสำหรับสแกน QR code จากเนื้อหาบนหน้าจอ
  features:
    eyebrow: วิธีถ่ายสกรีนช็อตที่ดีขึ้นบน Mac
    title: สิ่งที่ SnapTray เพิ่มให้กับเวิร์กโฟลว์ Mac ของคุณ
    subtitle: ประสิทธิภาพเนทีฟบน Apple Silicon และ Intel พร้อมการผสานรวม macOS อย่างลึกซึ้ง
    items:
      - title: การจับภาพคุณภาพ Retina
        body: SnapTray เรนเดอร์ที่ความละเอียด Retina เนทีฟ ทุกพิกเซลของจอแสดงผล HiDPI ถูกเก็บรักษาไว้ในภาพเอาต์พุต — ไม่มีอาร์ติแฟกต์จากการปรับขนาด
      - title: เข้าถึงแถบเมนูได้ทันที
        body: อยู่ในแถบเมนูและเปิดใช้งานได้ทันทีด้วย F2 ไม่มีไอคอน Dock ที่รกรุงรัง ไม่ต้องสลับแอป จับภาพจากบริบทใดก็ได้โดยไม่มีการขัดจังหวะ
      - title: มาร์กอัปในโอเวอร์เลย์การจับภาพ
        body: ลูกศร รูปทรง ข้อความ แบดจ์ขั้นตอน โมเสกเบลอ และสติกเกอร์อีโมจิพร้อมใช้งานทันทีหลังจับภาพ ไม่จำเป็นต้องเปิด Preview หรือโปรแกรมแก้ไขอื่น
      - title: ปักหมุด บันทึก และแยกข้อความ
        body: ปักหมุดภาพที่จับเป็นการอ้างอิงแบบลอย บันทึกเต็มหน้าจอเป็น MP4/GIF/WebP หรือแยกข้อความด้วย OCR — ทั้งหมดจากเครื่องมือ Mac เดียวกัน
  compare:
    eyebrow: เปรียบเทียบ
    title: "SnapTray vs ในตัวของ macOS vs Shottr vs CleanShot X"
    feature_label: ฟีเจอร์
    tools:
      - SnapTray
      - ในตัวของ macOS
