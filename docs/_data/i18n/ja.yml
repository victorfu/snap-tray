        detail: 自動更新のために Microsoft Store から SnapTray を入手するか、GitHub リリースからスタンドアロンインストーラーをダウンロードします。起動するとトレイアイコンがすぐに表示されます。
      - title: 範囲をキャプチャ
        detail: F2 を押してキャプチャオーバーレイを開きます。ドラッグして範囲を選択するか、検出されたウィンドウをクリックします。すべてのツールが揃った注釈ツールバーが自動的に表示されます。
      - title: 注釈とエクスポート
        detail: 矢印、テキスト、図形、ぼかしを追加します。Ctrl+C でコピー、Ctrl+S で保存、Enter で画面にピン留め。設定でお好みのワークフロー用に出力フォルダとホットキーを設定できます。
  faq:
    eyebrow: よくある質問
    title: Windows スクリーンショットツール — よくある質問
    items:
      - q: Windows でスクリーンショットを撮るには？
        a: "Windows は基本的な範囲キャプチャに Win+Shift+S、フルスクリーンに Print Screen を提供しています。注釈、録画、自動化を含む高度なワークフローには、SnapTray をインストールして F2 を押してください。ルーペ精度、即座の注釈、ワンキーエクスポートを提供します。"
      - q: SnapTray は高 DPI と 4K ディスプレイに対応していますか？
        a: はい。SnapTray は DPI 対応で、混在した DPI のマルチモニター設定を正確に処理します。キャプチャはスケーリングのアーティファクトなしにネイティブ解像度でレンダリングされます。
      - q: SnapTray は Microsoft Store で入手できますか？
        a: はい。自動更新とサンドボックスセキュリティのために Microsoft Store から SnapTray をインストールするか、GitHub リリースからスタンドアロンインストーラーをダウンロードできます。
      - q: SnapTray と ShareX の違いは何ですか？
        a: ShareX は数百の設定を持つ強力ですが複雑なツールです。SnapTray は速度とシンプルさに特化しています。トレイネイティブな起動、クリーンな注釈ツール、ピン留めウィンドウ、クロスプラットフォームサポート。どちらも無料でオープンソースです。
      - q: SnapTray と Greenshot の違いは何ですか？
        a: Greenshot は基本的なキャプチャと注釈を提供しますが、画面録画、ピン留めウィンドウ、OCR、自動ぼかし、CLI 自動化が欠けています。SnapTray はサポートするプラットフォームでピン留めウィンドウと CLI 自動化を追加し、macOS/Windows では録画、OCR、自動ぼかしも提供します。さらに macOS と Linux beta（スクリーンショット・注釈ワークフロー向け）もサポートします。
      - q: SnapTray をスクリプトや自動化で使えますか？
        a: "はい。SnapTray にはフル CLI が含まれています: snaptray full、snaptray region、snaptray record、snaptray pin、snaptray config。PowerShell スクリプト、バッチファイル、CI パイプラインに統合できます。"
