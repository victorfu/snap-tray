landing_mac:
  hero:
    title: Mac 最佳截圖工具
    intro: "macOS 給你 Cmd+Shift+4 — 然後就沒有了。沒有標註、沒有釘選視窗、沒有錄影、沒有 OCR。SnapTray 用一個常駐托盤的應用程式填補所有不足，完美融入你的 Mac 使用體驗。"
    cta_download: 下載 .dmg
    cta_docs: 閱讀文件
  problems:
    eyebrow: 問題所在
    title: 為什麼 Cmd+Shift+4 不夠用
    subtitle: macOS 內建截圖工具可以處理基本擷取，但無法滿足專業工作流程。
    items:
      - pain: 截圖後無法標註
        detail: macOS 只儲存原始圖片。要加箭頭、文字或模糊效果，必須開啟預覽程式或第三方編輯器 — 打斷你的工作流程。
      - pain: 無法釘選或浮動參考
        detail: 截圖無法保持在其他視窗上方顯示。每次擷取都消失在檔案中，迫使你不斷切換視窗。
      - pain: 沒有螢幕錄影管線
        detail: QuickTime Player 只能全螢幕錄影，沒有區域選取、暫停/繼續功能，也無法匯出 GIF 或 WebP。
      - pain: 沒有 OCR 或 QR Code 掃描
        detail: 從截圖中提取文字意味著手動重新輸入。也沒有內建方式掃描螢幕上的 QR Code。
  features:
    eyebrow: Mac 優勢
    title: SnapTray 為你的 Mac 增添什麼
    subtitle: 在 Apple Silicon 和 Intel 上原生運行，深度整合 macOS。
    items:
      - title: Retina 品質擷取
        body: SnapTray 以原生 Retina 解析度渲染。HiDPI 顯示器的每個像素都完整保留在輸出圖片中。
      - title: 系統托盤整合
        body: 常駐選單列，即時啟動。沒有 Dock 圖示干擾，無需切換應用程式 — 在任何情境下按 F2 即可。
      - title: 權限感知設定
        body: SnapTray 引導你完成螢幕錄影和輔助使用權限設定，提供一鍵捷徑前往系統設定。
      - title: 輕量且原生
        body: 使用 Qt 6 和 C++17 建構。沒有 Electron、沒有網頁執行環境。極小記憶體佔用，在 M 系列晶片上瞬間啟動。
  compare:
    eyebrow: 工具比較
    title: SnapTray 與 Mac 截圖替代方案比較
    feature_label: 功能
    tools:
      - SnapTray
      - macOS 內建
      - Shottr
      - CleanShot X
    rows:
      - feature: 帶放大鏡的區域截圖
        values: [true, false, true, true]
      - feature: 標註工具
        values: [true, false, true, true]
      - feature: 釘選至螢幕
        values: [true, false, false, true]
      - feature: 螢幕錄影
        values: [true, "僅 QuickTime", false, true]
      - feature: GIF / WebP 匯出
        values: [true, false, false, true]
      - feature: OCR 文字辨識
        values: [true, false, true, true]
      - feature: 自動模糊
        values: [true, false, false, true]
      - feature: CLI 自動化
        values: [true, false, false, false]
      - feature: 免費且開源
        values: [true, true, "免費版", false]
  setup:
    eyebrow: 快速開始
    title: 三步驟在 Mac 上開始使用
    steps:
      - title: 安裝
        detail: 下載 DMG，將 SnapTray 拖至應用程式資料夾並啟動。依提示授予螢幕錄影權限。
      - title: 擷取
        detail: 按下 F2 開始第一次區域擷取。放大鏡覆蓋層立即出現 — 拖曳選取區域。
      - title: 標註與分享
        detail: 加上箭頭或文字，然後按 Cmd+C 複製或 Cmd+S 儲存。按 Enter 將截圖釘選在螢幕上。
  faq:
    eyebrow: 常見問題
    title: Mac 相關問題
    items:
      - q: SnapTray 在 Apple Silicon 上是原生運行嗎？
        a: 是的。SnapTray 以通用二進位檔發布，在 Apple Silicon（M1/M2/M3/M4）和 Intel Mac 上都是原生運行，不需要 Rosetta 轉譯。
      - q: 為什麼 macOS 要求螢幕錄影權限？
        a: macOS 要求任何擷取螢幕內容的應用程式都必須取得螢幕錄影權限。SnapTray 需要此權限才能運作。請在系統設定 > 隱私權與安全性 > 螢幕錄影中授予。
      - q: SnapTray 和 CleanShot X 相比如何？
        a: CleanShot X 是付費應用程式，附帶雲端功能。SnapTray 免費、開源且完全離線。兩者都提供標註、錄影和 OCR — 但 SnapTray 額外提供 CLI 自動化和跨平台支援，而且完全免費。
      - q: 可以在 Mac 上錄製系統音訊嗎？
        a: macOS 系統音訊擷取需要 macOS 13+ 或虛擬音訊裝置（如 BlackHole）。麥克風擷取則開箱即用。
  cta:
    eyebrow: 立即開始
    title: 下載 SnapTray macOS 版
    subtitle: 免費、開源，Apple Silicon 原生支援。
    button: 下載 .dmg
    learn_more: 前往首頁

