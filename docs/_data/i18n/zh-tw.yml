        detail: QuickTime Player 只能全螢幕錄影，沒有區域選取、暫停/繼續功能，也無法匯出 GIF 或 WebP 快速分享。
      - pain: 沒有 OCR 或 QR Code 掃描
        detail: 從截圖中提取文字意味著手動重新輸入。也沒有內建方式掃描螢幕上的 QR Code。
