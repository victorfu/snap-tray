name: CI Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-macos:
    runs-on: macos-latest
    #runs-on: [self-hosted, macOS, ARM64]
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_CONFIGPATH: ${{ runner.temp }}/snap-tray-ccache.conf
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt@6 ccache
          echo "$(brew --prefix ccache)/libexec" >> $GITHUB_PATH

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-${{ github.ref }}
          restore-keys: macos-

      # ========================================
      # FetchContent Dependencies Cache
      # ========================================
      - name: Generate deps cache key
        id: deps-key
        run: |
          # Extract GIT_TAG lines and generate stable hash
          DEPS_HASH=$(grep -E "GIT_TAG\s+" CMakeLists.txt | sort | shasum -a 256 | cut -c1-16)
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          SDK_HASH=$(printf '%s' "$SDK_PATH" | shasum -a 256 | cut -c1-12)
          echo "hash=$DEPS_HASH" >> $GITHUB_OUTPUT
          echo "sdk_path=$SDK_PATH" >> $GITHUB_OUTPUT
          echo "sdk_hash=$SDK_HASH" >> $GITHUB_OUTPUT

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps/opencv-src
            build/_deps/opencv-build
            build/_deps/opencv-subbuild
            build/_deps/libwebp-src
            build/_deps/libwebp-build
            build/_deps/libwebp-subbuild
            build/_deps/qhotkey-src
            build/_deps/qhotkey-build
            build/_deps/qhotkey-subbuild
          key: deps-macos-${{ steps.deps-key.outputs.hash }}-${{ steps.deps-key.outputs.sdk_hash }}

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -DCMAKE_OSX_SYSROOT="${{ steps.deps-key.outputs.sdk_path }}" \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config Release --parallel 1

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build ccache git patchelf file libfuse2 \
            xvfb dbus-x11 \
            libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-keysyms1-dev libxcb-xinerama0-dev libxcb-render-util0-dev \
            libxcb-image0-dev libxcb-icccm4-dev libxcb-randr0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-sync-dev \
            libxrender-dev libxi-dev libxtst-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: true

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run Tests
        run: xvfb-run -a ctest --test-dir build --output-on-failure -C Release

  build-windows:
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      # Give the sccache server more time to initialize its GitHub Actions cache
      # backend before a compiler invocation gives up. The default is 10s, which
      # a single parallel build occasionally exceeds when the GHA cache service
      # is slow, failing one object file and aborting the whole build.
      SCCACHE_CONF: ${{ github.workspace }}\sccache.toml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt via aqtinstall
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache startup timeout
        run: Set-Content -Path $env:SCCACHE_CONF -Value 'server_startup_timeout_ms = 30000'

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja -y

      # ========================================
      # FetchContent Dependencies Cache
      # ========================================
      - name: Generate deps cache key
        id: deps-key
        shell: bash
        run: |
          # Extract GIT_TAG lines and generate stable hash
          DEPS_HASH=$(grep -E "GIT_TAG\s+" CMakeLists.txt | sort | sha256sum | cut -c1-16)
          echo "hash=$DEPS_HASH" >> $GITHUB_OUTPUT

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps/opencv-src
            build/_deps/opencv-build
            build/_deps/opencv-subbuild
            build/_deps/libwebp-src
            build/_deps/libwebp-build
            build/_deps/libwebp-subbuild
            build/_deps/qhotkey-src
            build/_deps/qhotkey-build
            build/_deps/qhotkey-subbuild
          key: deps-windows-${{ steps.deps-key.outputs.hash }}
          restore-keys: |
            deps-windows-

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure -C Release
