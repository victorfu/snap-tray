landing_mac:
  hero:
    title: Best Screenshot Tool for Mac
    intro: "macOS gives you Cmd+Shift+4 — and that is where it stops. No annotation, no pin windows, no recording, no OCR. SnapTray fills every gap with a single tray-native app that feels right at home on your Mac."
    cta_download: Download .dmg
    cta_docs: Read the Docs
  problems:
    eyebrow: The Problem
    title: Why Cmd+Shift+4 Is Not Enough
    subtitle: The built-in macOS screenshot tool handles basic captures, but falls short for professional workflows.
    items:
      - pain: No Annotation After Capture
        detail: macOS saves a raw image. To add arrows, text, or blur, you need to open Preview or a third-party editor — breaking your flow.
      - pain: No Pin or Floating Reference
        detail: You cannot keep a screenshot visible while working. Every capture disappears into a file, forcing constant window switching.
      - pain: No Screen Recording Pipeline
        detail: QuickTime Player records full screen, but there is no region selection, no pause/resume, and no GIF or WebP export.
      - pain: No OCR or QR Code Scanning
        detail: Extracting text from a screenshot means manually retyping it. There is no built-in way to scan QR codes from screen content.
  features:
    eyebrow: Mac Advantages
    title: What SnapTray Adds to Your Mac
    subtitle: Native performance on Apple Silicon and Intel, with deep macOS integration.
    items:
      - title: Retina-Quality Captures
        body: SnapTray renders at native Retina resolution. Every pixel of your HiDPI display is preserved in the output image.
      - title: System Tray Integration
        body: Lives in your menu bar and launches instantly. No Dock icon clutter, no app switching — press F2 from any context.
      - title: Permission-Aware Setup
        body: SnapTray guides you through Screen Recording and Accessibility permissions with one-click shortcuts to System Settings.
      - title: Lightweight and Native
        body: Built with Qt 6 and C++17. No Electron, no web runtime. Minimal memory footprint and instant startup on M-series chips.
  compare:
    eyebrow: Comparison
    title: SnapTray vs Mac Screenshot Alternatives
    feature_label: Feature
    tools:
      - SnapTray
      - macOS Built-in
      - Shottr
      - CleanShot X
