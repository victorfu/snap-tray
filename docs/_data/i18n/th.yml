features:
  eyebrow: ฟีเจอร์ทั้งหมด
  title: สร้างมาเพื่อกระบวนการจับภาพที่รวดเร็วและเป็นมืออาชีพ
  subtitle: ตั้งแต่สกรีนช็อตครั้งเดียวไปจนถึงเซสชันบันทึกหน้าจอบน macOS/Windows SnapTray รวมงานจับภาพทั้งหมดไว้ในเวิร์กโฟลว์ที่อยู่ในถาดระบบ
  items:
    - kind: Capture
      title: การจับภาพเฉพาะส่วน
      body: เป้าหมายด้วยไขว้และแว่นขยายที่แม่นยำ กด F2 เพื่อเริ่มต้นได้ทันที
    - kind: Canvas
      title: สกรีนแคนวาส
      body: วาดโดยตรงบนเดสก์ท็อปด้วย Ctrl+F2 / Cmd+F2 และมาร์กอัปในที่เดียว
    - kind: Pinning
      title: ปักหมุดบนหน้าจอ
      body: เก็บภาพอ้างอิงให้มองเห็นอยู่เหนือหน้าต่างอื่นๆ ปรับขนาดและหมุนได้อย่างอิสระ
    - kind: Annotation
      title: เครื่องมือที่หลากหลาย
      body: ลูกศร ดินสอ มาร์กเกอร์ รูปทรง ข้อความ โมเสก แบดจ์ขั้นตอน และสติกเกอร์อีโมจิ
    - kind: Automation
      title: OCR + เบลออัตโนมัติ
      body: แยกข้อความบน macOS/Windows และปิดบังใบหน้าหรือข้อมูลสำคัญโดยอัตโนมัติเพื่อการแชร์ที่ปลอดภัยยิ่งขึ้น
    - kind: Detection
      title: ตรวจจับหน้าต่าง
      body: เลือกหน้าต่างได้อย่างรวดเร็วโดยไม่ต้องลากขอบด้วยมือ
    - kind: Recording
      title: บันทึกหน้าจอ
      body: บน macOS/Windows บันทึกหน้าจอเต็มจอและส่งออกเป็น MP4 พร้อมเสียงเสริม หรือ GIF/WebP สำหรับคลิปไม่มีเสียง
    - kind: Utility
      title: เครื่องมือดูดสี
      body: ดูดสีบนหน้าจอ สลับระหว่าง HEX/RGB ด้วย Shift และคัดลอกทันทีด้วย C
    - kind: Control
      title: เลิกทำ / ทำซ้ำ
      body: ประวัติการดำเนินการเต็มรูปแบบสำหรับการมาร์กอัปทั้งหมด เพื่อให้แก้ไขได้ตลอดเวลา
    - kind: Branding
      title: ลายน้ำ
      body: ใส่ลายน้ำภาพแบบกำหนดเองลงบนสกรีนช็อตและ บน macOS/Windows ลงในการบันทึกหน้าจอด้วย
    - kind: Workflow
      title: ปุ่มลัดเป็นหลัก
      body: การจับภาพเฉพาะส่วน แคนวาส วาง ปักหมุดด่วน และแสดง/ซ่อนหมุด — กดปุ่มเดียวเสมอ

