  faq:
    eyebrow: FAQ
    title: Mac Screenshot Tool — Common Questions
    items:
      - q: How do I take a screenshot on Mac?
        a: "macOS provides Cmd+Shift+4 for region capture and Cmd+Shift+3 for full screen. For advanced workflows with annotation, recording, and sharing, install SnapTray and press F2 — it provides magnifier precision, instant annotation, and one-key export."
      - q: Does SnapTray run natively on Apple Silicon?
        a: Yes. SnapTray ships as a universal binary that runs natively on both Apple Silicon (M1/M2/M3/M4) and Intel Macs with no Rosetta translation.
      - q: Why does macOS ask for Screen Recording permission?
        a: macOS requires explicit Screen Recording permission for any app that captures screen content. SnapTray needs this to function. Grant it in System Settings > Privacy & Security > Screen Recording.
      - q: How does SnapTray compare to CleanShot X?
        a: CleanShot X is a paid app with cloud features. SnapTray is free, open-source, and fully offline. Both offer annotation, recording, and OCR — but SnapTray adds CLI automation and cross-platform support at no cost.
      - q: Can I record my screen on Mac with SnapTray?
        a: Yes. SnapTray records any region to MP4 with optional audio, or exports as GIF/WebP for silent clips. System audio capture requires macOS 13+ or a virtual audio device like BlackHole.
      - q: Is SnapTray better than Shottr?
        a: "Shottr is fast and lightweight but lacks screen recording, pin windows, and CLI automation. SnapTray includes all of these plus auto blur, watermarks, and cross-platform support — while remaining free and open source."
