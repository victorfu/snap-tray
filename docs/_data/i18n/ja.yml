landing_windows:
  hero:
    title: Windows 向け最高のスクリーンショットツール
    intro: "Windows の Snipping Tool は基本的なキャプチャには対応していますが、起動の遅さ、限られた注釈機能、録画機能の欠如により、日常使用には不十分です。ドキュメント作成、バグ報告、デザインフィードバックのためにスクリーンショットを撮るなら、もっと多くの機能が必要です。SnapTray は Snipping Tool を置き換える無料のオープンソーススクリーンショットツールで、即座のキャプチャ、豊富な注釈、録画、CLI 自動化を提供します。"
    cta_download: Windows 向けダウンロード
    cta_docs: ドキュメントを読む
  problems:
    eyebrow: 課題
    title: Snipping Tool の問題点
    subtitle: Windows のデフォルトのスクリーンショット体験はプロフェッショナルなワークフローではなく、時折の使用を想定して設計されています。
    items:
      - pain: 起動が遅い
        detail: Snipping Tool はキャプチャ前に全ウィンドウを開きます。ロードされる頃には、キャプチャしたかった瞬間がすでに過ぎている可能性があります。
      - pain: 基本的な注釈のみ
        detail: ペンとハイライターのみ。矢印も、図形も、ステップバッジも、テキストツールも、モザイクぼかしもなく、プロフェッショナルなマークアップに必要なものが何もありません。
      - pain: ピン留めやフローティング参照がない
        detail: キャプチャはすべてウィンドウまたはファイルに保存されます。作業中に他のアプリの上でスクリーンショットを表示したままにできません。
      - pain: CLI や自動化がない
        detail: コマンドラインインターフェースがありません。キャプチャをスクリプト化したり、CI に統合したり、繰り返しのスクリーンショットワークフローを自動化したりできません。
  features:
    eyebrow: Windows でより良いスクリーンショットを撮る方法
    title: SnapTray が Snipping Tool を置き換える理由
    subtitle: 高 DPI サポート、マルチモニター対応、Microsoft Store での提供。
    items:
