landing_screenshot_tool:
  hero:
    title: 高速キャプチャのための最高のスクリーンショットツール
    intro: "スクリーンショットツールは、ドキュメント作成、バグ報告、チュートリアル、クイック共有のために画面の任意の部分を画像としてキャプチャします。ほとんどの OS には基本的なツールが搭載されていますが、組み込みツールはキャプチャ止まりです。注釈、録画、スクリーンショットの共有を日常的に行うなら、そのワークフローに特化したツールが必要です。SnapTray は macOS、Windows、Ubuntu 22.04 X11 beta 向けの無料オープンソースのスクリーンショットツールで、キャプチャと注釈を一か所で処理します。録画は macOS および Windows で利用可能です。"
    cta_download: 無料でダウンロード
    cta_docs: ドキュメントを読む
  problems:
    eyebrow: 課題
    title: 組み込みのスクリーンショットツールが不十分な理由
    subtitle: Windows と macOS のデフォルトツールは日常的な使用ではなく、時折の使用を想定して設計されています。
    items:
      - pain: Windows Snipping Tool は低速で基本的
        detail: Snipping Tool はキャプチャ前に全ウィンドウを開きます。注釈はペンとハイライターのみに限定され、矢印、図形、テキストはありません。CLI も、画面ピン留めも、録画パイプラインもありません。
      - pain: Mac のスクリーンショットにはキャプチャ後のツールがない
        detail: Cmd+Shift+4 で範囲をキャプチャできますが、それで終わりです。注釈を加えるには Preview やサードパーティエディタが必要で、その都度ワークフローが中断されます。ピン留めウィンドウも、MP4/GIF/WebP 録画ワークフローも、OCR もありません。
      - pain: サードパーティツールは肥大化しているか有料
        detail: 多くの代替品はアカウント登録、クラウドサブスクリプションを要求するか、重い Electron アプリとして提供されます。シンプルなキャプチャ・注釈ワークフローに 500 MB の RAM や月額料金は不要です。
  features:
    eyebrow: 解決策
    title: SnapTray がどう解決するか
    subtitle: 組み込みのスクリーンショットワークフローを 3 ステップで置き換える、軽量なトレイ常駐ツール。
    items:
      - title: 即座に任意の範囲をキャプチャ
        body: F2 を押してキャプチャオーバーレイを起動。ルーペでピクセルレベルの精度を実現し、ウィンドウ検出でワンクリックによるウィンドウ全体の選択が可能。アプリの切り替えもロード画面も不要です。
      - title: キャプチャを離れずに注釈
        body: 矢印、図形、テキスト、ステップバッジ、モザイクぼかし、絵文字スタンプが同じオーバーレイ内に表示されます。別のエディタを開いたり、他のアプリに貼り付けたりする必要はありません。
      - title: 保存またはピン留め
        body: クリップボードにコピー、ディスクに保存、またはフローティング参照ウィンドウとしてピン留め。macOS/Windows ではフルスクリーン録画を MP4、GIF、WebP にエクスポート。すべての操作がワンキーで可能です。
  compare:
    eyebrow: 比較
    title: "SnapTray vs Snipping Tool vs Lightshot vs ShareX"
    feature_label: 機能
    tools:
      - SnapTray
      - Snipping Tool
      - Lightshot
      - ShareX
    rows:
      - feature: ルーペ付き範囲キャプチャ
        values: [true, false, false, true]
      - feature: 組み込み注釈ツール
        values: [true, false, true, true]
      - feature: 画面へのピン留め
        values: [true, false, false, false]
      - feature: 画面録画（MP4、macOS/Windows のみ）
        values: [true, true, false, true]
      - feature: GIF / WebP エクスポート（macOS/Windows のみ）
        values: [true, false, false, true]
      - feature: OCR テキスト抽出（macOS/Windows のみ）
        values: [true, false, false, true]
      - feature: 自動ぼかし（顔・認証情報）
        values: [true, false, false, false]
      - feature: CLI 自動化
        values: [true, false, false, true]
      - feature: クロスプラットフォーム（macOS + Windows + Linux beta）
        values: [true, false, false, false]
      - feature: 無料かつオープンソース
        values: [true, true, true, true]
  usecases:
    eyebrow: ユースケース
    title: スクリーンショットツールを日常的に使う人たち
    items:
      - role: 開発者
        scenario: エラートレースをキャプチャし、アーキテクチャ図に注釈を付け、macOS/Windows ではバグ報告用の再現手順を録画。GitHub の Issue や Slack に直接貼り付けられます。
      - role: デザイナー
        scenario: 参照画像を画面にピン留めし、レイアウトを並べて比較し、ピクセル距離を計測し、開発者向けの注釈付きフィードバックをエクスポートします。
      - role: サポートチーム
        scenario: カスタマーの問題をスクリーンショットし、ステップバッジの注釈を追加し、機密データをぼかす。すべて会話を離れずに完結します。
      - role: 教育者
        scenario: macOS/Windows でチュートリアルのウォークスルーを録画してインラインドキュメント用 GIF にエクスポート。スクリーンキャンバスでライブセッション中にスライドに注釈を付けます。
  setup:
    eyebrow: クイックスタート
    title: SnapTray の使い始め方
    steps:
      - title: ダウンロードとインストール
        detail: GitHub リリースから SnapTray を入手（macOS は DMG、Windows はインストーラー、Linux beta は AppImage）するか、Microsoft Store から Windows 版をインストールします。起動するとトレイアイコンがすぐに表示されます。
      - title: 最初のスクリーンショットを撮る
        detail: F2 を押してキャプチャオーバーレイを開きます。ドラッグして範囲を選択するか、検出されたウィンドウをクリックします。注釈ツールバーが自動的に表示されます。
      - title: 注釈、保存、ピン留め
        detail: 矢印、テキスト、図形、ぼかしを追加します。Ctrl+C / Cmd+C でコピー、Ctrl+S / Cmd+S で保存、Enter で画面にピン留め。
  faq:
    eyebrow: よくある質問
    title: スクリーンショットツールに関するよくある質問
    items:
      - q: スクリーンショットツールとは何ですか？
        a: スクリーンショットツールは、画面の一部または全体を画像としてキャプチャするソフトウェアです。基本的なツールは画像を保存するだけです。SnapTray のような高度なスクリーンショットツールは、注釈付けや画面へのキャプチャのピン留めも可能で、SnapTray は macOS/Windows でビデオ録画もできます。
      - q: SnapTray とは何ですか？
        a: SnapTray は macOS、Windows、Ubuntu 22.04 X11 beta 向けの無料オープンソースのスクリーンショット・注釈ツールです。システムトレイに常駐し、即座の範囲キャプチャ、豊富な注釈、ピン留めウィンドウ、CLI 自動化を提供します。MP4/GIF/WebP 録画と OCR は macOS および Windows で利用可能。Linux beta はキャプチャと注釈に特化しています。
      - q: SnapTray は無料ですか？
        a: はい。SnapTray は MIT ライセンスの下で完全に無料かつオープンソースです。広告、サブスクリプション、アカウント登録、隠れたコストは一切ありません。
      - q: SnapTray と Snipping Tool の違いは何ですか？
        a: Snipping Tool は最小限の注釈機能しか持たない基本的なキャプチャを提供します。SnapTray はルーペ、フル注釈ツールキット（矢印、図形、テキスト、ステップバッジ、モザイクぼかし）、ピン留めウィンドウ、CLI 自動化をサポートするプラットフォームで追加。画面録画、GIF/WebP エクスポート、OCR、自動ぼかしは macOS/Windows で利用可能です。
      - q: SnapTray と Lightshot の違いは何ですか？
        a: Lightshot はクイックキャプチャとシンプルな注釈を提供しますが、ピン留めウィンドウと CLI サポートが欠けています。SnapTray はサポートするプラットフォームでこれらを備え、macOS/Windows では画面録画、OCR、自動ぼかしを提供しながら、無料でオープンソースかつ完全オフラインです。
      - q: SnapTray はどのプラットフォームをサポートしていますか？
        a: SnapTray は macOS 14+（Apple Silicon および Intel）、Windows 10+（x64）、Ubuntu 22.04 X11 AppImage beta をサポートしています。録画と OCR は Linux beta には含まれず、Wayland セッションは非対応です。
      - q: スクリプトでスクリーンショットを自動化できますか？
        a: "はい。SnapTray には自動化のための CLI が含まれています。Linux beta では CLI は snaptray full、snaptray region、snaptray pin、snaptray config に対応。snaptray record は macOS/Windows でのみ利用可能です。シェルスクリプト、CI パイプライン、自動化ワークフローに統合できます。"
  cta:
    eyebrow: さっそく始めよう
    title: SnapTray をダウンロード — 無料かつオープンソース
    subtitle: macOS、Windows、Ubuntu 22.04 X11 beta に対応。アカウント登録不要。
    button: 今すぐダウンロード
    learn_more: ホームページへ

landing_mac:
  hero:
    title: Mac 向け最高のスクリーンショットツール
    intro: "macOS には基本的な画面キャプチャ用の Cmd+Shift+4 が搭載されていますが、それ止まりです。注釈もピン留めウィンドウも、MP4/GIF/WebP 録画ワークフローも、OCR もありません。仕事でスクリーンショットを毎日撮るなら、フルワークフローを処理できるツールが必要です。SnapTray は無料のオープンソーススクリーンショットツールで、Mac にプロフェッショナルなキャプチャ、注釈、録画、共有機能を追加します。"
    cta_download: .dmg をダウンロード
    cta_docs: ドキュメントを読む
  problems:
    eyebrow: 課題
    title: Cmd+Shift+4 では不十分な理由
    subtitle: macOS の組み込みスクリーンショットツールは基本的なキャプチャには対応していますが、プロフェッショナルなワークフローには不十分です。
    items:
      - pain: キャプチャ後の注釈機能がない
        detail: macOS は生の画像を保存します。矢印、テキスト、ぼかしを追加するには、Preview やサードパーティエディタを開く必要があり、その都度ワークフローが中断されます。
      - pain: ピン留めやフローティング参照がない
        detail: 作業中にスクリーンショットを表示したままにできません。キャプチャしたものはすべてファイルに消えてしまい、常にウィンドウを切り替えることになります。
      - pain: 画面録画パイプラインがない
        detail: QuickTime Player はフル画面を録画できますが、範囲選択がなく、一時停止/再開もなく、クイック共有用の GIF や WebP エクスポートもありません。
      - pain: OCR や QR コードスキャンがない
        detail: スクリーンショットからテキストを抽出するには手動で再入力する必要があります。画面コンテンツから QR コードをスキャンする組み込みの方法もありません。
  features:
    eyebrow: Mac でより良いスクリーンショットを撮る方法
    title: SnapTray が Mac ワークフローに追加するもの
    subtitle: Apple Silicon と Intel でネイティブパフォーマンス、深い macOS 統合。
    items:
      - title: Retina 品質のキャプチャ
        body: SnapTray はネイティブ Retina 解像度でレンダリングします。HiDPI ディスプレイのすべてのピクセルが出力画像に保持され、スケーリングによるアーティファクトはありません。
      - title: 即座のメニューバーアクセス
        body: メニューバーに常駐し、F2 で即座に起動。Dock アイコンの雑然さもなく、アプリの切り替えも不要。どのコンテキストからでも中断なくキャプチャできます。
      - title: キャプチャオーバーレイ内で注釈
        body: 矢印、図形、テキスト、ステップバッジ、モザイクぼかし、絵文字スタンプがキャプチャ直後に利用可能。Preview や別のエディタを開く必要はありません。
      - title: ピン留め、録画、テキスト抽出
        body: キャプチャをフローティング参照としてピン留め、フルスクリーンを MP4/GIF/WebP に録画、OCR でテキストを抽出。すべて同じ Mac ツールから操作できます。
  compare:
    eyebrow: 比較
    title: "SnapTray vs macOS 標準 vs Shottr vs CleanShot X"
    feature_label: 機能
    tools:
      - SnapTray
      - macOS 標準
      - Shottr
