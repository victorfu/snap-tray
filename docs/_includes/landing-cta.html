{% assign lang = page.lang | default: site.default_lang %}
{% assign t = site.data.i18n[lang][page.landing_key] %}

<section class="landing-cta" id="download">
  <div class="container">
    <div class="section-heading" data-reveal>
      <p class="eyebrow">{{ t.cta.eyebrow }}</p>
      <h2>{{ t.cta.title }}</h2>
      <p>{{ t.cta.subtitle }}</p>
    </div>
    <div class="landing-cta-actions" data-reveal>
      <a href="{{ site.data.routes.home[lang] | relative_url }}#download" class="btn btn-primary">{{ t.cta.button }}</a>
      <a href="{{ site.data.routes.home[lang] | relative_url }}" class="btn btn-ghost">{{ t.cta.learn_more }}</a>
    </div>
  </div>
</section>
