faq:
  eyebrow: FAQ
  title: คำถามที่พบบ่อย
  items:
    - q: SnapTray คืออะไร?
      a: SnapTray เป็นเครื่องมือสกรีนช็อตและมาร์กอัปฟรีที่มีน้ำหนักเบาสำหรับ macOS, Windows และ Ubuntu 22.04 X11 beta อยู่ในถาดระบบและให้คุณจับภาพเฉพาะส่วน มาร์กอัปสกรีนช็อต และปักหมุดภาพ การบันทึกหน้าจอและ OCR ไม่รวมอยู่ใน Linux beta
    - q: SnapTray ฟรีหรือไม่?
      a: ใช่ SnapTray ฟรีทั้งหมดและเป็นโอเพ่นซอร์สภายใต้ลิขสิทธิ์ MIT ไม่มีโฆษณา การสมัครสมาชิก หรือค่าใช้จ่ายซ่อนเร้น
    - q: SnapTray ต่างจาก Snipping Tool อย่างไร?
      a: SnapTray ก้าวไปไกลกว่าการจับภาพหน้าจอพื้นฐาน ด้วยเครื่องมือมาร์กอัปบนหน้าจอ หน้าต่างปักหมุดสำหรับการอ้างอิงแบบ always-on-top สกรีนแคนวาส การสแกน QR code และ CLI ครบชุดสำหรับระบบอัตโนมัติ การบันทึก MP4 พร้อมเสียง การส่งออก GIF/WebP การแยกข้อความด้วย OCR และเบลออัตโนมัติใช้ได้บน macOS/Windows แต่ไม่รวมใน Linux beta

