        body: システムトレイで動作し、F2 で即座にキャプチャ。開くウィンドウも、切り替えるアプリもなく、Snipping Tool と Win+Shift+S の両方より高速です。
      - title: フル注釈ツールキット
        body: 矢印、図形、テキスト、ステップバッジ、モザイクぼかし、絵文字スタンプ、元に戻す/やり直し。別のエディタを開かずにキャプチャオーバーレイ内で直接注釈を付けます。
      - title: 高 DPI とマルチモニター対応
        body: SnapTray は混在した DPI 設定と複数のモニターを正確に処理します。4K ディスプレイでもぼやけたキャプチャ、ずれた範囲、スケーリングのアーティファクトはありません。
