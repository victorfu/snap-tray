landing_screenshot_tool:
  hero:
    title: เครื่องมือสกรีนช็อตที่ดีที่สุดสำหรับการจับภาพอย่างรวดเร็ว
    intro: "เครื่องมือสกรีนช็อตจับส่วนใดก็ได้ของหน้าจอเป็นภาพ — สำหรับเอกสาร รายงานบัก บทช่วยสอน หรือการแชร์อย่างรวดเร็ว ระบบปฏิบัติการส่วนใหญ่มีเครื่องมือพื้นฐานในตัว แต่เครื่องมือในตัวหยุดแค่การจับภาพ หากคุณมาร์กอัป บันทึก หรือแชร์สกรีนช็อตเป็นประจำ คุณต้องการเครื่องมือที่สร้างมาเพื่อเวิร์กโฟลว์นั้น SnapTray เป็นเครื่องมือสกรีนช็อตฟรีโอเพ่นซอร์สสำหรับ macOS, Windows และ Ubuntu 22.04 X11 beta ที่จัดการการจับภาพและมาร์กอัปในที่เดียว การบันทึกหน้าจอใช้ได้บน macOS และ Windows"
    cta_download: ดาวน์โหลดฟรี
    cta_docs: อ่านเอกสาร
  problems:
    eyebrow: ปัญหา
    title: ทำไมเครื่องมือสกรีนช็อตในตัวถึงไม่เพียงพอ
    subtitle: เครื่องมือเริ่มต้นบน Windows และ macOS ออกแบบมาสำหรับการใช้งานเป็นครั้งคราว ไม่ใช่เวิร์กโฟลว์รายวัน
    items:
      - pain: Windows Snipping Tool ช้าและใช้งานง่ายเกินไป
        detail: Snipping Tool เปิดหน้าต่างเต็มก่อนที่คุณจะจับภาพได้ การมาร์กอัปจำกัดแค่ปากกาและไฮไลเตอร์ — ไม่มีลูกศร รูปทรง หรือข้อความ ไม่มี CLI ไม่มีการปักหมุดบนหน้าจอ และไม่มีกระบวนการบันทึกหน้าจอ
      - pain: สกรีนช็อตบน Mac ขาดเครื่องมือหลังการจับภาพ
        detail: Cmd+Shift+4 จับภาพเฉพาะส่วน แต่หยุดอยู่แค่นั้น ในการมาร์กอัป คุณต้องใช้ Preview หรือโปรแกรมแก้ไขของบุคคลที่สาม ไม่มีหน้าต่างปักหมุด ไม่มีเวิร์กโฟลว์บันทึก MP4/GIF/WebP และไม่มี OCR
      - pain: เครื่องมือบุคคลที่สามมีขนาดใหญ่เกินไปหรือเสียเงิน
        detail: ทางเลือกหลายอย่างต้องการบัญชี การสมัครสมาชิกคลาวด์ หรือมาพร้อมกับแอป Electron ขนาดหนัก เวิร์กโฟลว์จับภาพและมาร์กอัปแบบง่ายๆ ไม่ควรต้องใช้ RAM 500 MB หรือค่าธรรมเนียมรายเดือน
  features:
    eyebrow: ทางออก
    title: SnapTray แก้ปัญหานี้อย่างไร
    subtitle: เครื่องมือที่มีน้ำหนักเบาและอยู่ในถาดระบบ ทดแทนเวิร์กโฟลว์สกรีนช็อตในตัวของคุณใน 3 ขั้นตอน
    items:
      - title: จับภาพส่วนใดก็ได้ทันที
        body: กด F2 เพื่อเปิดโอเวอร์เลย์การจับภาพ แว่นขยายให้ความแม่นยำระดับพิกเซล และการตรวจจับหน้าต่างช่วยให้เลือกทั้งหน้าต่างได้ด้วยคลิกเดียว ไม่ต้องสลับแอปหรือรอหน้าจอโหลด
      - title: มาร์กอัปโดยไม่ต้องออกจากหน้าจับภาพ
        body: ลูกศร รูปทรง ข้อความ แบดจ์ขั้นตอน โมเสกเบลอ และสติกเกอร์อีโมจิปรากฏในโอเวอร์เลย์เดียวกัน ไม่จำเป็นต้องเปิดโปรแกรมแก้ไขแยกต่างหากหรือวางลงในแอปอื่น
      - title: บันทึกหรือปักหมุดผลลัพธ์
        body: คัดลอกไปยังคลิปบอร์ด บันทึกลงดิสก์ หรือปักหมุดเป็นหน้าต่างอ้างอิงแบบลอย บน macOS/Windows บันทึกหน้าจอเต็มจอและส่งออกเป็น MP4, GIF หรือ WebP ทุกการดำเนินการอยู่ห่างแค่กดปุ่มเดียว
  compare:
    eyebrow: เปรียบเทียบ
    title: "SnapTray vs Snipping Tool vs Lightshot vs ShareX"
    feature_label: ฟีเจอร์
    tools:
      - SnapTray
