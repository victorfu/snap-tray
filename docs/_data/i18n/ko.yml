faq:
  eyebrow: 자주 묻는 질문
  title: 자주 묻는 질문
  items:
    - q: SnapTray란 무엇인가요?
      a: SnapTray는 macOS, Windows, Ubuntu 22.04 X11 beta용 무료 경량 스크린샷·주석 도구입니다. 시스템 트레이에 상주하며 영역 캡처, 스크린샷 주석 추가, 이미지 고정, 결과 즉시 공유가 가능합니다. 녹화와 OCR은 Linux beta에 포함되지 않습니다.
    - q: SnapTray는 무료인가요?
      a: 네, SnapTray는 MIT 라이선스 하에 완전히 무료 오픈 소스입니다. 광고, 구독, 숨겨진 비용이 없습니다.
    - q: SnapTray와 Snipping Tool의 차이점은 무엇인가요?
      a: SnapTray는 기본 화면 캡처를 넘어 화면 주석 도구, 항상 위 참조용 핀 창, 스크린 캔버스 모드, QR 코드 스캔, 자동화를 위한 전체 CLI를 제공합니다. macOS/Windows에서는 MP4 오디오 녹화, GIF/WebP 내보내기, OCR 텍스트 추출, 자동 블러를 사용할 수 있으며 Linux beta에는 포함되지 않습니다.

